services:
  roundcube-init:
    image: busybox:1.36
    container_name: roundcube-init
    command: sh -c "chown -R ${PUID}:${GUID} /config && mkdir -p /data/temp /data/logs && chown -R ${PUID}:${GUID} /data"
    volumes:
      - ./config:/config
      - ./data:/data
    network_mode: none
    read_only: true
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, DAC_OVERRIDE]
    security_opt: [no-new-privileges:true]

  roundcubemail:
    image: roundcube/roundcubemail:latest-nonroot
    container_name: roundcubemail
    user: ${PUID}:${GUID} 
    restart: unless-stopped
    depends_on:
      roundcube-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy

    volumes:
      - ./config/nonroot-custom-php-config.ini:/usr/local/etc/php/conf.d/zzz-nonroot-custom-php-config.ini 
      - ./config/config.inc.php:/var/roundcube/config/config.inc.php
      - ./config/aaronsoft_config.inc.php:/var/roundcube/config/aaronsoft_config.inc.php
      - ./config/get-orga-niced_config.inc.php:/var/roundcube/config/get-orga-niced_config.inc.php
      - ./data/temp:/var/www/html/temp
      - ./data/logs:/var/www/html/logs

    environment:
      - ROUNDCUBEMAIL_USERNAME_DOMAIN=%d
      - ROUNDCUBEMAIL_PLUGINS=archive,attachment_reminder,emoticons, filesystem_attachments,managesieve,password,subscriptions_option,vcard_attachments,zipdownload,google_addressbook
      - ROUNDCUBEMAIL_COMPOSER_PLUGINS=ashus/google-addressbook
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://mail.gandi.net
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=ssl://mail.gandi.net
      - ROUNDCUBEMAIL_SMTP_PORT=465
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=mariadb
      - ROUNDCUBEMAIL_DB_USER=${ROUNDCUBEMAIL_MYSQL_USER}
      - ROUNDCUBEMAIL_DB_PASSWORD=${ROUNDCUBEMAIL_MYSQL_PASSWORD}
      - ROUNDCUBEMAIL_DB_NAME=${ROUNDCUBEMAIL_MYSQL_DATABASE}
      - ROUNDCUBEMAIL_GOOGLE_CLIENT_ID=${ROUNDCUBEMAIL_GOOGLE_CLIENT_ID}
      - ROUNDCUBEMAIL_GOOGLE_CLIENT_SECRET=${ROUNDCUBEMAIL_GOOGLE_CLIENT_SECRET}

    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]

    tmpfs:
      - /tmp
      - /var/run/apache2
      - /var/log/apache2
      - /run/lock

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.roundcube.rule=${ROUNDCUBEMAIL_HOST_RULE}"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.services.roundcube.loadbalancer.server.port=8000"

    networks:
      - traefik-public
      - db-internal

networks:
  traefik-public:
    name: traefik-public
  db-internal:
    name: db-internal