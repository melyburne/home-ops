services:
  # --- Init Service: Prepares permissions for Roundcube ---
  roundcube-init:
    image: busybox:1.36
    container_name: roundcube-init
    network_mode: none
    
    # Execution: Sets ownership for config directory
    command: sh -c "chown -R ${PUID}:${GUID} /config"
    
    # State: Mounts the config directory
    volumes:
      - ./config:/config
      
    # Security: Isolated execution with the minimum capabilities needed
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, DAC_OVERRIDE]

  # --- Main Web Service: Roundcube Webmail ---
  roundcube:
    build: .
    image: roundcube-custom:latest-nonroot
    pull_policy: build
    container_name: roundcube
    restart: unless-stopped
    user: ${PUID}:${GUID} 

    # Lifecycle: Wait for permissions to be fixed and database to be ready
    depends_on:
      roundcube-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy

    # Connectivity: Public facing proxy and internal database network
    networks:
      - traefik-public
      - db-internal

    # Configuration: Roundcube features, mail server bindings, database, and OAuth2
    environment:
      - ROUNDCUBEMAIL_USERNAME_DOMAIN=%d
      - ROUNDCUBEMAIL_PLUGINS=archive,attachment_reminder,emoticons,filesystem_attachments,managesieve,password,subscriptions_option,vcard_attachments,zipdownload,google_addressbook
      - ROUNDCUBEMAIL_COMPOSER_PLUGINS=ashus/google-addressbook
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://mail.gandi.net
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=ssl://mail.gandi.net
      - ROUNDCUBEMAIL_SMTP_PORT=465
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=mariadb
      - ROUNDCUBEMAIL_DB_USER=${ROUNDCUBE_MYSQL_USER}
      - ROUNDCUBEMAIL_DB_PASSWORD=${ROUNDCUBE_MYSQL_PASSWORD}
      - ROUNDCUBEMAIL_DB_NAME=${ROUNDCUBE_MYSQL_DATABASE}
      - GANDIV5_PERSONAL_ACCESS_TOKEN=${GANDIV5_PERSONAL_ACCESS_TOKEN}
      - ROUNDCUBEMAIL_GOOGLE_CLIENT_ID=${ROUNDCUBE_GOOGLE_CLIENT_ID}
      - ROUNDCUBEMAIL_GOOGLE_CLIENT_SECRET=${ROUNDCUBE_GOOGLE_CLIENT_SECRET}

    # State: Configuration mounts and in-memory temporary space
    volumes:
      - ./config/nonroot-custom-php-config.ini:/usr/local/etc/php/conf.d/zzz-nonroot-custom-php-config.ini 
      - ./config/config.inc.php:/var/roundcube/config/config.inc.php
    tmpfs:
      - /tmp

    # Routing: Traefik dynamic configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.roundcube.rule=${ROUNDCUBE_HOST_RULE}"
      - "traefik.http.routers.roundcube.entrypoints=websecure"
      - "traefik.http.services.roundcube.loadbalancer.server.port=8000"

    # Security: Hardened container dropping all root capabilities
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

    # Monitoring: Internal check to ensure the webmail interface is responding
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# --- Global Network Definitions ---
networks:
  traefik-public:
    name: traefik-public
  db-internal:
    name: db-internal