services:
  # --- Init Service: Prepares permissions for Roundcube ---
  roundcube-init:
    extends:
      file: ../../core/templates.yml
      service: base-init
    container_name: roundcube-init
    command: sh -c "chgrp -R ${GUID:-1000} /config && chmod -R 640 /config/*"
    volumes:
      - ./config:/config

  # --- Main Web Service: Roundcube Webmail ---
  roundcube:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: ghcr.io/kartoffelbauer/docker-roundcube-custom:${ROUNDCUBE_DOCKER_TAG:-latest-nonroot}
    container_name: roundcube

    # Security: Run as non-root user
    user: "${PUID:-1000}:${GUID:-1000}"

    # Lifecycle: Wait for database to be ready
    depends_on:
      mariadb:
        condition: service_healthy
      roundcube-init:
        condition: service_completed_successfully

    # Connectivity: Public facing proxy and internal database network
    networks:
      - traefik-public
      - mariadb-internal

    # Configuration: Roundcube features, mail server bindings, database, and OAuth2
    environment:
      ROUNDCUBEMAIL_USERNAME_DOMAIN: "%d"
      ROUNDCUBEMAIL_PLUGINS: "archive,attachment_reminder,emoticons,filesystem_attachments,managesieve,password,subscriptions_option,vcard_attachments,zipdownload,carddav"
      ROUNDCUBEMAIL_COMPOSER_PLUGINS: "roundcube/carddav"
      ROUNDCUBEMAIL_DEFAULT_HOST: "${ROUNDCUBE_IMAP_HOST:?}"
      ROUNDCUBEMAIL_DEFAULT_PORT: "${ROUNDCUBE_IMAP_PORT:-993}"
      ROUNDCUBEMAIL_SMTP_SERVER: "${ROUNDCUBE_SMTP_SERVER:?}"
      ROUNDCUBEMAIL_SMTP_PORT: "${ROUNDCUBE_SMTP_PORT:-465}"
      ROUNDCUBEMAIL_DB_TYPE: "mysql"
      ROUNDCUBEMAIL_DB_HOST: "mariadb"
      ROUNDCUBEMAIL_DB_USER: "${ROUNDCUBE_DB_USER:-roundcube}"
      ROUNDCUBEMAIL_DB_PASSWORD: "${ROUNDCUBE_DB_PASSWORD:?}"
      ROUNDCUBEMAIL_DB_NAME: "${ROUNDCUBE_DB_NAME:-roundcubemail}"
      GANDIV5_PERSONAL_ACCESS_TOKEN: "${GANDIV5_PERSONAL_ACCESS_TOKEN:?}"

    # State: Configuration mounts and in-memory temporary space
    volumes:
      - ./config/nonroot-custom-php-config.ini:/usr/local/etc/php/conf.d/zzz-nonroot-custom-php-config.ini:ro
      - ./config/config.inc.php:/var/roundcube/config/config.inc.php:ro
    tmpfs:
      - /tmp

    # Routing: Traefik dynamic configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.roundcube.rule=${ROUNDCUBE_HOST_RULE:-Host(`mail.localhost`)}"
      - "traefik.http.routers.roundcube.entrypoints=websecure"
      - "traefik.http.services.roundcube.loadbalancer.server.port=8000"

    # Monitoring: Internal check to ensure the webmail interface is responding
    healthcheck:
      test: ["CMD-SHELL", "curl -sfL http://127.0.0.1:8000/ || exit 1"]


# --- Global Network Definitions ---
networks:
  traefik-public:
  mariadb-internal: