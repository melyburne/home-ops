# ==============================================================================
# App: Immich (Self-hosted photo and video backup)
# ==============================================================================

services:
  # --- Main Web Service: Immich Server ---
  immich-server:
    extends:
      file: ../../shared/templates.yml
      service: base-default-outbound
    image: ghcr.io/immich-app/immich-server:${IMMICH_DOCKER_TAG:-release}
    container_name: immich-server

    # SECURITY HARMONY: Allow internal root, but strip all kernel privileges
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    # Lifecycle: Wait for required backend services
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy

    # Connectivity: Attach to public Traefik network and isolated internal backend
    networks:
      - traefik-public
      - immich-internal

    # Configuration: Explicitly map your custom environment variables (Alphabetized)
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_NAME:?}"
      DB_HOSTNAME: "immich-postgres"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD:?}"
      DB_USERNAME: "${IMMICH_DB_USERNAME:?}"
      REDIS_HOSTNAME: "immich-redis"

    # State: Mount the primary upload location and sync host time
    volumes:
      - ${IMMICH_UPLOAD_LOCATION:?}:/data
      - /etc/localtime:/etc/localtime:ro

    # Routing: Traefik dynamic reverse proxy configuration (Alphabetized)
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.rule=Host(`${IMMICH_SUBDOMAIN:-immich}.${DOMAIN_PRIMARY:-localhost}`)"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  # --- Machine Learning Service: Immich ML ---
  immich-machine-learning:
    extends:
      file: ../../shared/templates.yml
      service: base-default
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_DOCKER_TAG:-release}
    container_name: immich-machine-learning

    # SECURITY HARMONY: Allow internal root, but strip all kernel privileges
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    # Connectivity: Internal communication only; no direct public exposure
    networks:
      - immich-internal

    # Configuration: Database and Redis bindings
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_NAME:?}"
      DB_HOSTNAME: "immich-postgres"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD:?}"
      DB_USERNAME: "${IMMICH_DB_USERNAME:?}"
      REDIS_HOSTNAME: "immich-redis"

    # State: Persistent volume for downloaded ML models
    volumes:
      - immich-model-cache:/cache

  # --- Message Broker: Redis (Valkey) ---
  immich-redis:
    extends:
      file: ../../shared/templates.yml
      service: base-default
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    container_name: immich-redis

    security_opt:
      - no-new-privileges:true

    # Connectivity: Internal communication only
    networks:
      - immich-internal

    # Monitoring: Validate broker availability
    healthcheck:
      test: "redis-cli ping || exit 1"

  # --- Database: PostgreSQL (with pgvector) ---
  immich-postgres:
    extends:
      file: ../../shared/templates.yml
      service: base-default
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich-postgres

    security_opt:
      - no-new-privileges:true

    # Connectivity: Internal communication only
    networks:
      - immich-internal

    # Configuration: Database initialization credentials
    environment:
      POSTGRES_DB: "${IMMICH_DB_NAME:?}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
      POSTGRES_PASSWORD: "${IMMICH_DB_PASSWORD:?}"
      POSTGRES_USER: "${IMMICH_DB_USERNAME:?}"

    # Performance: Recommended shared memory size for heavy vector operations
    shm_size: 128mb

    # State: Map to your custom database data location
    volumes:
      - ${IMMICH_DB_DATA_LOCATION:?}:/var/lib/postgresql/data


# --- Global Network Definitions ---
networks:
  traefik-public:
  immich-internal:
    internal: true

# --- Global Volume Definitions ---
volumes:
  immich-model-cache:
