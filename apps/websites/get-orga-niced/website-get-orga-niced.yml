services:
  # --- Main Web Service ---
  website-get-orga-niced:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: ghcr.io/kartoffelbauer/web-get-orga-niced:${WEB_GETORGANICED_DOCKER_TAG:-latest}
    container_name: website-get-orga-niced

    # Security: Lock the filesystem
    read_only: true

    # Connectivity: Attach to the shared reverse proxy network
    networks:
      - traefik-public

    # Routing: Traefik dynamic configuration (Alphabetized)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-get-orga-niced.entrypoints=websecure"
      - "traefik.http.routers.web-get-orga-niced.rule=${WEB_GETORGANICED_HOST_RULE:-Host(`organiced.localhost`)}"
      - "traefik.http.services.web-get-orga-niced.loadbalancer.server.port=8080"

    # State: In-memory mounts explicitly required for Nginx to run on a read-only filesystem
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    # Monitoring: Internal check to ensure the web server is actually responding
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"


# --- Global Network Definitions ---
networks:
  traefik-public: