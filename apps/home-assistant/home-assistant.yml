# --- DRY Templates ---
# Template for Home Assistant Extension Initialization
x-ha-ext-base: &ha-ext-base
  image: alpine:${ALPINE_DOCKER_TAG:-3.23}

  # Execution: Run as root and define platform for compatibility
  user: root
  platform: linux/amd64

  # Security: Set base privileges and capabilities
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - FOWNER
    - FSETID
    - DAC_OVERRIDE

  # Lifecycle: Wait for required services to be ready before running
  depends_on:
    home-assistant-init:
      condition: service_completed_successfully
    pihole:
      condition: service_healthy

  # Execution: Set base entrypoint
  entrypoint:
    - /bin/sh
    - /init.sh

  # Connectivity: Needs internet to hit GitHub API
  networks:
    - outbound-public

  # State: Mount the config volume and script
  volumes:
    - ./data/config:/config
    - ./init/init-extensions.sh:/init.sh:ro


services:
  # --- Init Service: Prepares config permissions before Home Assistant starts ---
  home-assistant-init:
    extends:
      file: ../../shared/templates.yml
      service: base-init
    container_name: home-assistant-init
    command: >
      sh -c "
        mkdir -p /data/config && mkdir -p /data/media &&
        cp /config/configuration.yaml /data/config/ &&
        touch /data/config/automations.yaml /data/config/scripts.yaml /data/config/scenes.yaml /data/config/secrets.yaml &&
        chown -R 0:0 /data
      "
    volumes:
      - ./data:/data
      - ./config:/config

  # --- Ext Init Service: Downloads Home Assistant custom components ---
  home-assistant-ext-init:
    <<: *ha-ext-base
    container_name: home-assistant-ext-init

    # Configuration: Environment variables
    environment:
      GITHUB_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}

    # Execution: Download and install custom extensions via script
    command:
      # Integration extensions
      - "integration=3dg1luk43/ha_washdata:${HOMEASSISTANT_EXT_HA_WASHDATA_DOCKER_TAG:-latest}"
      - "integration=edmogeor/hass-ga-manual-ui:${HOMEASSISTANT_EXT_HASS_GA_MANUAL_UI_DOCKER_TAG:-latest}"
      - "integration=marsh4200/ar_smart_ir_builder:${HOMEASSISTANT_EXT_ARSMARTIR_BUILDER_DOCKER_TAG:-latest}"
      - "integration=marsh4200/ar_smart_ir:${HOMEASSISTANT_EXT_ARSMARTIR_DOCKER_TAG:-latest}"

      # Frontend extensions
      - "frontend=brunosabot/streamline-card:${HOMEASSISTANT_EXT_STREAMLINE_CARD_DOCKER_TAG:-latest}"
      - "frontend=custom-cards/button-card:${HOMEASSISTANT_EXT_BUTTON_CARD_DOCKER_TAG:-latest}"
      - "frontend=francois-le-ko4la/lovelace-entity-progress-card:${HOMEASSISTANT_EXT_LOVELACE_ENTITY_PROGRESS_CARD_DOCKER_TAG:-latest}"
      - "frontend=piitaya/lovelace-mushroom:${HOMEASSISTANT_EXT_LOVELACE_MUSHROOM_DOCKER_TAG:-latest}"

  # --- Main Smart Home Service: Home Assistant ---
  home-assistant:
    extends:
      file: ../../shared/templates.yml
      service: base-secure-outbound
    image: ghcr.io/home-assistant/home-assistant:${HOMEASSISTANT_DOCKER_TAG:-2026.7}
    container_name: home-assistant

    # Connectivity: Use host network mode for device discovery (mDNS)
    network_mode: host

    # Security: Lock file system and explicitly grant required kernel capabilities
    read_only: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined

    # Lifecycle: Wait for extensions
    depends_on:
      home-assistant-ext-init:
        condition: service_completed_successfully

    # Configuration: Environment variables
    environment:
      HOMEASSISTANT_LOG_LEVEL: "${HOMEASSISTANT_LOG_LEVEL:-info}"

    # State: Mount config and media directories, plus read-only access to D-Bus
    volumes:
      - ./data/config:/config
      - ./config/streamline-templates.yaml:/config/www/community/streamline-card/streamline_templates.yaml:ro
      - ./data/media:/media
      - /run/dbus:/run/dbus:ro
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev
      - /run:rw,exec,nosuid,nodev

    # Monitoring: Internal check targeting the native API
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8123/ || exit 1"

# --- Global Network Definitions ---
networks:
  outbound-public:
