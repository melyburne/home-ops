services:
  # --- Init Service: Prepares config permissions before Home Assistant starts ---
  home-assistant-init:
    extends:
      file: ../../shared/templates.yml
      service: base-init
    container_name: home-assistant-init

    # Execution: Run a shell command to prepare the configuration directory and set permissions
    command: >
      sh -c "
        mkdir -p /data/config &&
        cp /config/configuration.yaml /data/config/configuration.yaml &&
        touch /data/config/automations.yaml /data/config/scripts.yaml /data/config/scenes.yaml /data/config/secrets.yaml &&
        chown -R ${HOMEASSISTANT_PUID:-1004}:${HOMEASSISTANT_PGID:-1004} /data
      "

    # State: Mount both the persistent data directory and the static source config directory
    volumes:
      - ./data:/data
      - ./config:/config

  # --- Main Smart Home Service: Home Assistant ---
  home-assistant:
    extends:
      file: ../../shared/templates.yml
      service: base-default
    image: lscr.io/linuxserver/homeassistant:${HOMEASSISTANT_DOCKER_TAG:-2026.6.4}
    container_name: home-assistant

    # Connectivity: Use host network mode for device discovery (mDNS)
    network_mode: host

    # Security: Explicitly grant required kernel capabilities
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Lifecycle: Wait for database and init
    depends_on:
      mariadb:
        condition: service_healthy
      home-assistant-init:
        condition: service_completed_successfully

    # Configuration: Mount configuration and media directories, and read-only mount the main configuration file
    environment:
      HOMEASSISTANT_DB_URL: "mysql://homeassistant:${HOMEASSISTANT_DB_PASSWORD:?}@127.0.0.1:3306/homeassistant?charset=utf8mb4"
      HOMEASSISTANT_LOG_LEVEL: "${HOMEASSISTANT_LOG_LEVEL:-info}"
      PGID: "${HOMEASSISTANT_PGID:-1004}"
      PUID: "${HOMEASSISTANT_PUID:-1004}"

    # State: Persistent data mounts
    volumes:
      - ./data/config:/config
      - ./data/media:/media
      - ./data/config/configuration.yaml:/config/configuration.yaml:ro
      - /run/dbus:/run/dbus:ro

    # Monitoring: Internal check targeting the native API
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8123/ || exit 1"
      start_period: 1500s