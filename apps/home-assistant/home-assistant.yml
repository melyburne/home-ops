services:
  # --- Init Service: Prepares config permissions before Home Assistant starts ---
  home-assistant-init:
    extends:
      file: ../../../shared/templates.yml
      service: base-init
    container_name: home-assistant-init

    # Execution: Fix config permissions
    command: sh -c "chown -R ${HOMEASSISTANT_PUID:-1004}:${HOMEASSISTANT_PGID:-1004} /config && chmod 600 /config/configuration.yaml"

    # State: Mount config directory
    volumes:
      - ./config:/config


  # --- Main Smart Home Service: Home Assistant ---
  home-assistant:
    extends:
      file: ../../shared/templates.yml
      service: base-default
    image: lscr.io/linuxserver/homeassistant:${HOMEASSISTANT_DOCKER_TAG:-2026.6}
    container_name: home-assistant

    # Security: Explicitly grant required kernel capabilities dropped by base-secure.
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Lifecycle: Wait for database to be ready
    depends_on:
      mariadb:
        condition: service_healthy

    # Connectivity: Public facing proxy, outbound APIs, and internal database
    networks:
      - traefik-public
      - outbound-public
      - mariadb-internal

    # Configuration: DB injection and native LinuxServer privilege mapping (Alphabetized)
    environment:
      HOMEASSISTANT_DB_URL: "mysql://homeassistant:${HOMEASSISTANT_DB_PASSWORD:?}@mariadb/homeassistant?charset=utf8mb4"
      PGID: "${HOMEASSISTANT_PGID:-1004}"
      PUID: "${HOMEASSISTANT_PUID:-1004}"

    # Routing: Traefik dynamic configuration (Alphabetized)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.home-assistant.entrypoints=websecure"
      - "traefik.http.routers.home-assistant.rule=Host(`${HOMEASSISTANT_SUBDOMAIN:-home}.${DOMAIN_PRIMARY:-localhost}`)"
      - "traefik.http.routers.home-assistant.service=home-assistant"
      - "traefik.http.services.home-assistant.loadbalancer.server.port=8123"

    # State: Persistent data, system message bus, and required in-memory mounts
    volumes:
      - ./data/config:/config
      - ./data/media:/media
      - ./config/configuration.yaml:/config/configuration.yaml:rw
      # - /run/dbus:/run/dbus:ro # Optional: Uncomment to enable D-Bus support for certain integrations (e.g., Bluetooth, Z-Wave)

    # Monitoring: Internal check targeting the native API
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8123/ || exit 1"
      start_period: 1500s

# --- Global Network Definitions ---
networks:
  traefik-public:
  outbound-public:
  mariadb-internal: