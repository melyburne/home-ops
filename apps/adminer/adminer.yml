services:
  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped

    env_file:
      - ../../.env
      - .env

    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true

    tmpfs:
      - /tmp
      - /var/lib/php/sessions

    environment:
      - TZ=${TZ}
      - ADMINER_DESIGN=lavender-light

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=${HOST_RULE}"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls=true"
      - "traefik.http.routers.adminer.middlewares=sec-public@file"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"

    networks:
      - traefik-public
      - db-internal

    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  traefik-public:
    name: traefik-public
  db-internal:
    name: db-internal