services:
  # --- Main Web Service ---
  website-get-orga-niced:
    image: ghcr.io/kartoffelbauer/web-get-orga-niced:latest
    container_name: website-get-orga-niced
    restart: unless-stopped

    # Connectivity: Attach to the shared reverse proxy network
    networks:
      - traefik-public

    # Routing: Traefik dynamic configuration (HTTPS, middleware, internal port mapping)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-get-orga-niced.rule=${WEB_GETORGANICED_HOST_RULE}"
      - "traefik.http.routers.web-get-orga-niced.entrypoints=websecure"
      - "traefik.http.services.web-get-orga-niced.loadbalancer.server.port=8080"

    # State: In-memory mounts explicitly required for Nginx to run on a read-only filesystem
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    # Security: Hardened container dropping all root capabilities and locking the filesystem
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # Monitoring: Internal check to ensure the web server is actually responding
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

# --- Global Network Definitions ---
networks:
  traefik-public: