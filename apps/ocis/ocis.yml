# --- DRY Templates ---
# Template for oCIS Web Extensions
x-ocis-ext-base: &ocis-ext-base
  user: root
  platform: linux/amd64
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - FOWNER
    - FSETID
    - DAC_OVERRIDE
  depends_on:
    ocis-init:
      condition: service_completed_successfully
  volumes:
    - ocis-apps:/apps

# Template for oCIS Web Extensions
x-ocis-ext-default: &ocis-ext-default
  <<: *ocis-ext-base
  entrypoint:
    - /bin/sh
    - -c
  network_mode: none

# Template for oCIS Web Extensions with custom logic
x-ocis-ext-custom: &ocis-ext-custom
  <<: *ocis-ext-base
  image: alpine:${ALPINE_DOCKER_TAG:-latest}
  entrypoint:
    - /bin/sh
    - /init.sh
  networks:
    - outbound-public
  volumes:
    - ocis-apps:/apps
    - ./init/init-extensions.sh:/init.sh:ro


services:
  # --- Init Service: Prepares permissions for oCIS ---
  ocis-init:
    extends:
      file: ../../core/templates.yml
      service: base-init
    container_name: ocis-init

    # Execution: Set correct ownership for oCIS directories
    command:
      - sh
      - -c
      - "chown -R ${PUID:-1000}:${GUID:-1000} /ocis-config /ocis-data /ocis-apps"

    # State: Mount configuration and data directories
    volumes:
      - ${OCIS_CONFIG_DIR:-./data/config/}:/ocis-config
      - ${OCIS_DATA_DIR:-./data/data/}:/ocis-data
      - ocis-apps:/ocis-apps

  # --- Web Extensions ---
  ocis-ext-photo-addon-init:
    <<: *ocis-ext-default
    image: owncloud/web-extensions:photo-addon-${OCIS_EXT_PHOTO_ADDON_DOCKER_TAG:-latest}
    container_name: ocis-ext-photo-addon-init
    # Execution: Copy extension to shared volume
    command:
      - -c
      - "cp -R /var/lib/nginx/html/photo-addon/ /apps"

  ocis-ext-jsonviewer-init:
    <<: *ocis-ext-default
    image: owncloud/web-extensions:json-viewer-${OCIS_EXT_JSON_VIEWER_DOCKER_TAG:-latest}
    container_name: ocis-ext-jsonviewer-init
    # Execution: Copy extension to shared volume
    command:
      - -c
      - "cp -R /var/lib/nginx/html/json-viewer/ /apps"

  ocis-ext-advanced-search-init:
    <<: *ocis-ext-default
    image: owncloud/web-extensions:advanced-search-${OCIS_EXT_ADV_SEARCH_DOCKER_TAG:-latest}
    container_name: ocis-ext-advanced-search-init
    # Execution: Copy extension to shared volume
    command:
      - -c
      - "cp -R /var/lib/nginx/html/advanced-search/ /apps"

  ocis-ext-unzip-init:
    <<: *ocis-ext-default
    image: owncloud/web-extensions:unzip-${OCIS_EXT_UNZIP_DOCKER_TAG:-latest}
    container_name: ocis-ext-unzip-init
    # Execution: Copy extension to shared volume
    command:
      - -c
      - "cp -R /var/lib/nginx/html/unzip/ /apps"

  ocis-ext-drawio-init:
    <<: *ocis-ext-default
    image: owncloud/web-extensions:draw-io-${OCIS_EXT_DRAWIO_DOCKER_TAG:-latest}
    container_name: ocis-ext-drawio-init
    # Execution: Copy extension to shared volume
    command:
      - -c
      - "cp -R /var/lib/nginx/html/draw-io/ /apps"

  ocis-ext-3dviewer-init:
    <<: *ocis-ext-default
    image: sawjan/3dviewer:${OCIS_EXT_3D_VIEWER_DOCKER_TAG:-0.1.0}
    container_name: ocis-ext-3dviewer-init
    # Execution: Copy extension to shared volume
    command:
      - -c
      - "cp -R /app/* /apps"

  ocis-ext-custom-init:
    <<: *ocis-ext-custom
    container_name: ocis-ext-custom-init
    # Execution: Download and install custom extensions via script
    command:
      - "LukasHirt/web-app-excalidraw:${OCIS_EXT_EXCALIDRAW_DOCKER_TAG:-latest}"
      - "mschlachter/ocis-app-tokens:${OCIS_EXT_APP_TOKENS_DOCKER_TAG:-latest}"

  # --- Full Text Search Extractor ---
  tika:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: apache/tika:latest-full
    container_name: ocis-tika

    # Security: Run as non-root user
    user: "${PUID:-1000}:${GUID:-1000}"

    # Connectivity: Internal network for oCIS communication
    networks:
      - ocis-internal

    # Monitoring: Local logging driver and healthcheck
    logging:
      driver: local
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO /dev/null http://127.0.0.1:9998/version || exit 1"

  # --- Main oCIS Server ---
  ocis:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: owncloud/ocis:${OCIS_DOCKER_TAG:-latest}
    container_name: ocis

    # Security: Run as non-root user
    user: "${PUID:-1000}:${GUID:-1000}"

    # Lifecycle: Wait for extensions and tika
    depends_on:
      ocis-ext-photo-addon-init:
        condition: service_completed_successfully
      ocis-ext-jsonviewer-init:
        condition: service_completed_successfully
      ocis-ext-advanced-search-init:
        condition: service_completed_successfully
      ocis-ext-unzip-init:
        condition: service_completed_successfully
      ocis-ext-drawio-init:
        condition: service_completed_successfully
      ocis-ext-3dviewer-init:
        condition: service_completed_successfully
      ocis-ext-custom-init:
        condition: service_completed_successfully
      tika:
        condition: service_healthy

    # Connectivity: Internal communication and public proxy exposure
    networks:
      - ocis-internal
      - traefik-public

    # Configuration: Core oCIS environment variables and features
    environment:
      OCIS_ADD_RUN_SERVICES: "notifications, auth-app"
      OCIS_URL: "https://${OCIS_DOMAIN:-ocis.localhost}"
      OCIS_LOG_LEVEL: "info"
      OCIS_LOG_COLOR: "false"
      OCIS_LOG_PRETTY: "false"
      PROXY_TLS: "false"
      GATEWAY_GRPC_ADDR: "0.0.0.0:9142"
      OCIS_INSECURE: "true"
      PROXY_ENABLE_BASIC_AUTH: "true"
      PROXY_ENABLE_APP_AUTH: "true"
      IDM_ADMIN_PASSWORD: "admin"
      IDM_CREATE_DEMO_USERS: "false"
      NOTIFICATIONS_SMTP_HOST: "${OCIS_SMTP_HOST:?}"
      NOTIFICATIONS_SMTP_PORT: "${OCIS_SMTP_PORT:-465}"
      NOTIFICATIONS_SMTP_SENDER: "${OCIS_SMTP_SENDER:?}"
      NOTIFICATIONS_SMTP_USERNAME: "${OCIS_SMTP_USERNAME:?}"
      NOTIFICATIONS_SMTP_PASSWORD: "${OCIS_SMTP_PASSWORD:?}"
      NOTIFICATIONS_SMTP_AUTHENTICATION: "${OCIS_SMTP_AUTHENTICATION:-login}"
      NOTIFICATIONS_SMTP_INSECURE: "false"
      MICRO_REGISTRY_ADDRESS: "127.0.0.1:9233"
      NATS_NATS_HOST: "0.0.0.0"
      NATS_NATS_PORT: "9233"
      PROXY_CSP_CONFIG_FILE_LOCATION: "/etc/ocis/csp.yaml"
      ONLYOFFICE_DOMAIN: "${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.localhost}"
      OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST: "banned-password-list.txt"
      SEARCH_EXTRACTOR_TYPE: "tika"
      SEARCH_EXTRACTOR_TIKA_TIKA_URL: "http://tika:9998"
      FRONTEND_FULL_TEXT_SEARCH_ENABLED: "true"

    # Execution: Initialize if needed, then start server
    entrypoint:
      - /bin/sh
    command:
      - -c
      - "ocis init || true; exec ocis server"

    # Routing: Traefik reverse proxy configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ocis.entrypoints=websecure"
      - "traefik.http.routers.ocis.rule=Host(`${OCIS_DOMAIN:-ocis.localhost}`)"
      - "traefik.http.routers.ocis.service=ocis"
      - "traefik.http.services.ocis.loadbalancer.server.port=9200"

    # State: Persistent data, config overrides, and web apps
    volumes:
      - ${OCIS_CONFIG_DIR:-./data/config/}:/etc/ocis
      - ${OCIS_DATA_DIR:-./data/data/}:/var/lib/ocis
      - ./config/ocis/app-registry.yaml:/etc/ocis/app-registry.yaml
      - ./config/ocis/apps.yaml:/etc/ocis/apps.yaml
      - ./config/ocis/csp.yaml:/etc/ocis/csp.yaml
      - ./config/ocis/banned-password-list.txt:/etc/ocis/banned-password-list.txt
      - ocis-apps:/var/lib/ocis/web/assets/apps

    # Monitoring: Local logging driver and healthcheck
    logging:
      driver: local
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO /dev/null http://127.0.0.1:9200/healthz || exit 1"

  # --- Connector: oCIS to OnlyOffice ---
  collaboration-oo:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: owncloud/ocis:${OCIS_DOCKER_TAG:-latest}
    container_name: ocis-collaboration-oo

    # Security: Run as non-root user
    user: "${PUID:-1000}:${GUID:-1000}"

    # Lifecycle: Wait for oCIS core and OnlyOffice to be ready
    depends_on:
      ocis:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy

    # Connectivity: Internal communication and outbound requests
    networks:
      - ocis-internal
      - traefik-public

    # Configuration: Connector connection details
    environment:
      COLLABORATION_GRPC_ADDR: "0.0.0.0:9301"
      COLLABORATION_HTTP_ADDR: "0.0.0.0:9300"
      MICRO_REGISTRY: "nats-js-kv"
      MICRO_REGISTRY_ADDRESS: "ocis:9233"
      COLLABORATION_WOPI_SRC: "http://collaboration-oo:9300"
      COLLABORATION_APP_NAME: "OnlyOffice"
      COLLABORATION_APP_PRODUCT: "OnlyOffice"
      COLLABORATION_APP_ADDR: "https://${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.localhost}"
      COLLABORATION_APP_ICON: "https://${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.localhost}/web-apps/apps/documenteditor/main/resources/img/favicon.ico"
      COLLABORATION_APP_INSECURE: "true"
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: "true"
      COLLABORATION_WOPI_SECRET: "${OCIS_ONLYOFFICE_JWT_SECRET:?}"
      COLLABORATION_LOG_LEVEL: "info"
      OCIS_URL: "https://${OCIS_DOMAIN:-ocis.localhost}"

    # Execution: Start the collaboration service
    command:
      - collaboration
      - server

    # State: Shared oCIS configuration
    volumes:
      - ${OCIS_CONFIG_DIR:-./data/config/}:/etc/ocis

    # Monitoring: Local logging driver and healthcheck
    logging:
      driver: local
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO /dev/null http://127.0.0.1:9304/healthz || exit 1"

  # --- Document Server: OnlyOffice ---
  onlyoffice:
    extends:
      file: ../../core/templates.yml
      service: base-default
    image: onlyoffice/documentserver:${OCIS_ONLYOFFICE_DOCKER_TAG:-latest}
    container_name: ocis-onlyoffice

    # Security: Remove all kernel privileges, add back only what's strictly needed
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - AUDIT_WRITE
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - KILL

    # Lifecycle: Wait for database to be ready
    depends_on:
      mariadb:
        condition: service_healthy

    # Connectivity: Internal communication and public proxy exposure
    networks:
      - ocis-internal
      - mariadb-internal
      - traefik-public

    # Configuration: Document server core settings
    environment:
      WOPI_ENABLED: "true"
      USE_UNAUTHORIZED_STORAGE: "true"
      JWT_ENABLED: "true"
      JWT_SECRET: "${OCIS_ONLYOFFICE_JWT_SECRET:?}"
      JWT_HEADER: "Authorization"
      AMQP_URI: "amqp://guest:guest@localhost"
      DB_TYPE: "mariadb"
      DB_HOST: "mariadb"
      DB_PORT: "3306"
      DB_NAME: "${OCIS_ONLYOFFICE_DB_NAME:-onlyoffice}"
      DB_USER: "${OCIS_ONLYOFFICE_DB_USER:-onlyoffice}"
      DB_PWD: "${OCIS_ONLYOFFICE_DB_PASSWORD:?}"
      REDIS_SERVER_HOST: "localhost"
      REDIS_SERVER_PORT: "6379"

    # Execution: Run custom entrypoint script
    entrypoint:
      - /bin/sh
      - /entrypoint-override.sh

    # Routing: Traefik reverse proxy configuration with middleware
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onlyoffice.entrypoints=websecure"
      - "traefik.http.routers.onlyoffice.rule=Host(`${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.localhost}`)"
      - "traefik.http.routers.onlyoffice.service=onlyoffice"
      - "traefik.http.services.onlyoffice.loadbalancer.server.port=80"
      - "traefik.http.middlewares.onlyoffice.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.onlyoffice.middlewares=onlyoffice"

    # State: Mount custom scripts and local configuration
    volumes:
      - ./config/onlyoffice/entrypoint-override.sh:/entrypoint-override.sh
      - ./config/onlyoffice/local.json:/etc/onlyoffice/documentserver/local.dist.json

    # Monitoring: Local logging driver and healthcheck
    logging:
      driver: local
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -f http://127.0.0.1/healthcheck || exit 1"
      start_period: 300s


# --- Global Network Definitions ---
networks:
  traefik-public:
  outbound-public:
  mariadb-internal:
  ocis-internal:
    name: ocis-internal

# --- Global Volumes ---
volumes:
  ocis-apps: