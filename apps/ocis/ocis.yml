services:
  # --- Init Service: Prepares permissions for oCIS ---
  ocis-init:
    image: busybox:${BUSYBOX_VERSION_TAG}
    container_name: ocis-init
    network_mode: none
    
    # Execution: Sets ownership and permissions for config and data directory
    command: sh -c "chgrp -R ${GUID} /config && chmod -R 640 /config/* && chown -R ${PUID}:${GUID} /data"
    
    # State: Mounts the config and data directory
    volumes:
      - ./config:/config
      - ./data:/data
      
    # Security: Isolated execution with the minimum capabilities needed
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, DAC_OVERRIDE]

  ocis:
    image: owncloud/ocis:${OCIS_VERSION_TAG}
    # changelog: https://github.com/owncloud/ocis/tree/master/changelog
    # release notes: https://doc.owncloud.com/ocis_release_notes.html
    user: ${PUID}:${GUID}
    networks:
      - traefik-public
    entrypoint:
      - /bin/sh
    # run ocis init to initialize a configuration file with random secrets
    # it will fail on subsequent runs, because the config file already exists
    # therefore we ignore the error and then start the ocis server
    command: ["-c", "ocis init || true; exec ocis server"]
    environment:
      # enable services that are not started automatically
      OCIS_ADD_RUN_SERVICES: "notifications"
      OCIS_URL: https://${OCIS_DOMAIN}
      OCIS_LOG_LEVEL: "info"
      OCIS_LOG_COLOR: "false"
      OCIS_LOG_PRETTY: "false"
      # do not use SSL between Traefik and oCIS
      PROXY_TLS: "false"
      # make the REVA gateway accessible to the app drivers
      GATEWAY_GRPC_ADDR: 0.0.0.0:9142
      # INSECURE: needed if oCIS / Traefik is using self generated certificates
      OCIS_INSECURE: "true"
      # basic auth (not recommended, but needed for eg. WebDav clients that do not support OpenID Connect)
      PROXY_ENABLE_BASIC_AUTH: "true"
      # admin user password
      IDM_ADMIN_PASSWORD: "admin" # this overrides the admin password from the configuration file
      # demo users
      IDM_CREATE_DEMO_USERS: "false"
      # email server (if configured)
      NOTIFICATIONS_SMTP_HOST: "${OCIS_SMTP_HOST}"
      NOTIFICATIONS_SMTP_PORT: "${OCIS_SMTP_PORT}"
      NOTIFICATIONS_SMTP_SENDER: "${OCIS_SMTP_SENDER}"
      NOTIFICATIONS_SMTP_USERNAME: "${OCIS_SMTP_USERNAME}"
      NOTIFICATIONS_SMTP_INSECURE: "false"
      # make the registry available to the app provider containers
      MICRO_REGISTRY_ADDRESS: 127.0.0.1:9233
      NATS_NATS_HOST: 0.0.0.0
      NATS_NATS_PORT: 9233
      PROXY_CSP_CONFIG_FILE_LOCATION: /etc/ocis/csp.yaml
      # these three vars are needed to the csp config file to include the web office apps and the importer
      COLLABORA_DOMAIN: ${COLLABORA_DOMAIN:-collabora.owncloud.test}
      ONLYOFFICE_DOMAIN: ${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.owncloud.test}
      COMPANION_DOMAIN: ${COMPANION_DOMAIN:-companion.owncloud.test}
      # enable to allow using the banned passwords list
      OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST: banned-password-list.txt
      # fulltext search
      SEARCH_EXTRACTOR_TYPE: tika
      SEARCH_EXTRACTOR_TIKA_TIKA_URL: http://tika:9998
      FRONTEND_FULL_TEXT_SEARCH_ENABLED: "true"
    volumes:
      - ./config/ocis/app-registry.yaml:/etc/ocis/app-registry.yaml
      - ./config/ocis/csp.yaml:/etc/ocis/csp.yaml
      - ./config/ocis/banned-password-list.txt:/etc/ocis/banned-password-list.txt
      # configure the .env file to use own paths instead of docker internal volumes
      - ${OCIS_CONFIG_DIR}:/etc/ocis
      - ${OCIS_DATA_DIR}:/var/lib/ocis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ocis.entrypoints=websecure"
      - "traefik.http.routers.ocis.rule=Host(`${OCIS_DOMAIN}`)"
      - "traefik.http.routers.ocis.service=ocis"
      - "traefik.http.services.ocis.loadbalancer.server.port=9200"
    logging:
      driver: local
    restart: always

  collaboration-oo:
    image: owncloud/ocis:${OCIS_VERSION_TAG}
    user: ${PUID}:${GUID}
    networks:
      - traefik-public
    depends_on:
      ocis:
        condition: service_started
      onlyoffice:
        condition: service_healthy
    command: ["collaboration", "server"]
    environment:
      COLLABORATION_GRPC_ADDR: 0.0.0.0:9301
      COLLABORATION_HTTP_ADDR: 0.0.0.0:9300
      MICRO_REGISTRY: "nats-js-kv"
      MICRO_REGISTRY_ADDRESS: "ocis:9233"
      COLLABORATION_WOPI_SRC: http://collaboration-oo:9300
      COLLABORATION_APP_NAME: "OnlyOffice"
      COLLABORATION_APP_PRODUCT: "OnlyOffice"
      COLLABORATION_APP_ADDR: https://${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.owncloud.test}
      COLLABORATION_APP_ICON: https://${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.owncloud.test}/web-apps/apps/documenteditor/main/resources/img/favicon.ico
      COLLABORATION_APP_INSECURE: "true"
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: "true"
      COLLABORATION_LOG_LEVEL: info
      OCIS_URL: https://${OCIS_DOMAIN}
    volumes:
      # configure the .env file to use own paths instead of docker internal volumes
      - ${OCIS_CONFIG_DIR}:/etc/ocis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collaboration-oo.entrypoints=http"
      - "traefik.http.routers.collaboration-oo.rule=Host(`collaboration-oo`)"
      - "traefik.http.routers.collaboration-oo.service=collaboration-oo"
      - "traefik.http.services.collaboration-oo.loadbalancer.server.port=9300"
    logging:
      driver: local
    restart: always

  onlyoffice:
    # note, you also need to add a volume when using the enterprise version, see below
    image: onlyoffice/documentserver:${OCIS_ONLYOFFICE_VERSION_TAG}
    user: ${PUID}:${GUID}
    networks:
      - traefik-public
    entrypoint:
      - /bin/sh
      - /entrypoint-override.sh
    environment:
      WOPI_ENABLED: "true"
      # self-signed certificates
      USE_UNAUTHORIZED_STORAGE: true
      JWT_ENABLED: false
      REDIS_SERVER_HOST: localhost
      REDIS_SERVER_PORT: 6379
    volumes:
      # paths are relative to the main compose file
      - ./config/onlyoffice/entrypoint-override.sh:/entrypoint-override.sh
      - ./config/onlyoffice/local.json:/etc/onlyoffice/documentserver/local.dist.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onlyoffice.entrypoints=websecure"
      - "traefik.http.routers.onlyoffice.rule=Host(`${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.owncloud.test}`)"
      - "traefik.http.routers.onlyoffice.service=onlyoffice"
      - "traefik.http.services.onlyoffice.loadbalancer.server.port=80"
      # websockets can't be opened when this is omitted
      - "traefik.http.middlewares.onlyoffice.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.onlyoffice.middlewares=onlyoffice"
    logging:
      driver: local
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/hosting/discovery"]

  tika:
    image: apache/tika:latest-full
    user: ${PUID}:${GUID}
    # release notes: https://tika.apache.org
    networks:
      - traefik-public
    restart: always
    logging:
      driver: local

# --- Global Network Definitions ---
networks:
  traefik-public: