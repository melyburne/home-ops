# --- DRY Templates ---
# Define common settings here to reuse across services
x-secure-service: &secure-service
  user: ${PUID}:${GUID}
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: local
  restart: always

x-standard-service: &standard-service
  logging:
    driver: local
  restart: always

services:
  # --- Init Service: Prepares permissions for oCIS ---
  ocis-init:
    extends:
      file: ../../core/templates.yml
      service: base-init
    container_name: ocis-init
    command: sh -c "chown -R ${PUID}:${GUID} /ocis-config /ocis-data"
    volumes:
      - ${OCIS_CONFIG_DIR}:/ocis-config
      - ${OCIS_DATA_DIR}:/ocis-data

  # --- Main oCIS Server ---
  ocis:
    <<: *secure-service # Injects user, security, and logging config
    image: owncloud/ocis:${OCIS_VERSION_TAG}
    networks:
      - traefik-public
      - ocis
    entrypoint:
      - /bin/sh
    command: ["-c", "ocis init || true; exec ocis server"]
    environment:
      OCIS_ADD_RUN_SERVICES: "notifications"
      OCIS_URL: "https://${OCIS_DOMAIN}"
      OCIS_LOG_LEVEL: "info"
      OCIS_LOG_COLOR: "false"
      OCIS_LOG_PRETTY: "false"
      PROXY_TLS: "false"
      GATEWAY_GRPC_ADDR: "0.0.0.0:9142"
      OCIS_INSECURE: "true"
      PROXY_ENABLE_BASIC_AUTH: "true"
      IDM_ADMIN_PASSWORD: "admin"
      IDM_CREATE_DEMO_USERS: "false"
      NOTIFICATIONS_SMTP_HOST: "${OCIS_SMTP_HOST}"
      NOTIFICATIONS_SMTP_PORT: "${OCIS_SMTP_PORT}"
      NOTIFICATIONS_SMTP_SENDER: "${OCIS_SMTP_SENDER}"
      NOTIFICATIONS_SMTP_USERNAME: "${OCIS_SMTP_USERNAME}"
      NOTIFICATIONS_SMTP_INSECURE: "false"
      MICRO_REGISTRY_ADDRESS: "127.0.0.1:9233"
      NATS_NATS_HOST: "0.0.0.0"
      NATS_NATS_PORT: "9233"
      PROXY_CSP_CONFIG_FILE_LOCATION: "/etc/ocis/csp.yaml"
      ONLYOFFICE_DOMAIN: "${OCIS_ONLYOFFICE_DOMAIN}"
      OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST: "banned-password-list.txt"
      SEARCH_EXTRACTOR_TYPE: "tika"
      SEARCH_EXTRACTOR_TIKA_TIKA_URL: "http://tika:9998"
      FRONTEND_FULL_TEXT_SEARCH_ENABLED: "true"
    depends_on:
      ocis-init:
        condition: service_completed_successfully
    volumes:
      - ${OCIS_CONFIG_DIR}:/etc/ocis
      - ${OCIS_DATA_DIR}:/var/lib/ocis
      - ./config/ocis/app-registry.yaml:/etc/ocis/app-registry.yaml
      - ./config/ocis/csp.yaml:/etc/ocis/csp.yaml
      - ./config/ocis/banned-password-list.txt:/etc/ocis/banned-password-list.txt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ocis.entrypoints=websecure"
      - "traefik.http.routers.ocis.rule=Host(`${OCIS_DOMAIN}`)"
      - "traefik.http.routers.ocis.service=ocis"
      - "traefik.http.services.ocis.loadbalancer.server.port=9200"

  # --- Connector: oCIS to OnlyOffice ---
  collaboration-oo:
    <<: *secure-service 
    image: owncloud/ocis:${OCIS_VERSION_TAG}
    networks:
      - outbound-traffic
      - ocis
    depends_on:
      ocis:
        condition: service_started
      onlyoffice:
        condition: service_healthy
    command: ["collaboration", "server"]
    environment:
      COLLABORATION_GRPC_ADDR: "0.0.0.0:9301"
      COLLABORATION_HTTP_ADDR: "0.0.0.0:9300"
      MICRO_REGISTRY: "nats-js-kv"
      MICRO_REGISTRY_ADDRESS: "ocis:9233"
      COLLABORATION_WOPI_SRC: "http://collaboration-oo:9300"
      COLLABORATION_APP_NAME: "OnlyOffice"
      COLLABORATION_APP_PRODUCT: "OnlyOffice"
      COLLABORATION_APP_ADDR: "https://${OCIS_ONLYOFFICE_DOMAIN}"
      COLLABORATION_APP_ICON: "https://${OCIS_ONLYOFFICE_DOMAIN}/web-apps/apps/documenteditor/main/resources/img/favicon.ico"
      COLLABORATION_APP_INSECURE: "true"
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: "true"
      COLLABORATION_LOG_LEVEL: "info"
      OCIS_URL: "https://${OCIS_DOMAIN}"
    volumes:
      - ${OCIS_CONFIG_DIR}:/etc/ocis

  # --- Document Server: OnlyOffice ---
  onlyoffice:
    <<: *standard-service # Injects basic logging/restart, but skips capability dropping
    image: onlyoffice/documentserver:${OCIS_ONLYOFFICE_VERSION_TAG}
    networks:
      - traefik-public
      - ocis
    entrypoint:
      - /bin/sh
      - /entrypoint-override.sh
    environment:
      WOPI_ENABLED: "true"
      USE_UNAUTHORIZED_STORAGE: "true"
      JWT_ENABLED: "false"
      REDIS_SERVER_HOST: "localhost"
      REDIS_SERVER_PORT: "6379"
    volumes:
      - ./config/onlyoffice/entrypoint-override.sh:/entrypoint-override.sh
      - ./config/onlyoffice/local.json:/etc/onlyoffice/documentserver/local.dist.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onlyoffice.entrypoints=websecure"
      - "traefik.http.routers.onlyoffice.rule=Host(`${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.owncloud.test}`)"
      - "traefik.http.routers.onlyoffice.service=onlyoffice"
      - "traefik.http.services.onlyoffice.loadbalancer.server.port=80"
      - "traefik.http.middlewares.onlyoffice.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.onlyoffice.middlewares=onlyoffice"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/hosting/discovery"]

  # --- Full Text Search Extractor ---
  tika:
    <<: *secure-service 
    image: apache/tika:latest-full
    networks:
      - ocis

# --- Global Network Definitions ---
networks:
  traefik-public:
  outbound-traffic:
  ocis:
    internal: true