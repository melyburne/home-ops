# --- DRY Templates ---
# Template for oCIS Web Extensions
x-ocis-extension: &ocis-extension
  user: root
  platform: linux/amd64
  network_mode: none
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  cap_add: [CHOWN, FOWNER, FSETID, DAC_OVERRIDE]
  depends_on:
    ocis-init: { condition: service_completed_successfully }
  entrypoint: ["/bin/sh", "-c"]
  volumes:
    - ocis-apps:/apps


services:
  # --- Init Service: Prepares permissions for oCIS ---
  ocis-init:
    extends:
      file: ../../core/templates.yml
      service: base-init
    container_name: ocis-init

    # Execution: Set correct ownership for oCIS directories
    command: sh -c "chown -R ${PUID}:${GUID} /ocis-config /ocis-data /ocis-apps"

    # State: Mount configuration and data directories
    volumes:
      - ${OCIS_CONFIG_DIR}:/ocis-config
      - ${OCIS_DATA_DIR}:/ocis-data
      - ocis-apps:/ocis-apps

  # --- Web Extensions ---
  photo-addon-init:
    <<: *ocis-extension
    image: owncloud/web-extensions:photo-addon-${OCIS_EXT_PHOTO_ADDON_VERSION_TAG}
    container_name: ocis-photo-addon-init
    command: ["-c", "cp -R /var/lib/nginx/html/photo-addon/ /apps"]

  jsonviewer-init:
    <<: *ocis-extension
    image: owncloud/web-extensions:json-viewer-${OCIS_EXT_JSON_VIEWER_VERSION_TAG}
    container_name: ocis-jsonviewer-init
    command: ["-c", "cp -R /var/lib/nginx/html/json-viewer/ /apps"]

  advanced-search-init:
    <<: *ocis-extension
    image: owncloud/web-extensions:advanced-search-${OCIS_EXT_ADV_SEARCH_VERSION_TAG}
    container_name: ocis-advanced-search-init
    command: ["-c", "cp -R /var/lib/nginx/html/advanced-search/ /apps"]

  unzip-init:
    <<: *ocis-extension
    image: owncloud/web-extensions:unzip-${OCIS_EXT_UNZIP_VERSION_TAG}
    container_name: ocis-unzip-init
    command: ["-c", "cp -R /var/lib/nginx/html/unzip/ /apps"]

  drawio-init:
    <<: *ocis-extension
    image: owncloud/web-extensions:draw-io-${OCIS_EXT_DRAWIO_VERSION_TAG}
    container_name: ocis-drawio-init
    command: ["-c", "cp -R /var/lib/nginx/html/draw-io/ /apps"]

  3dviewer-init:
    <<: *ocis-extension
    image: sawjan/3dviewer:${OCIS_EXT_3D_VIEWER_VERSION_TAG}
    container_name: ocis-3dviewer-init
    command: ['-c', 'cp -R /app/* /apps']

  # --- Full Text Search Extractor ---
  tika:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: apache/tika:latest-full
    container_name: ocis-tika

    # Security: Run as non-root user
    user: "${PUID}:${GUID}"

    # Connectivity: Internal network for oCIS communication
    networks:
      - ocis-internal

    # Monitoring: Local logging driver and healthcheck
    logging:
      driver: local
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9998/version || exit 1"]

  # --- Main oCIS Server ---
  ocis:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: owncloud/ocis:${OCIS_VERSION_TAG}
    container_name: ocis

    # Security: Run as non-root user
    user: "${PUID}:${GUID}"

    # Lifecycle: Wait for initialization and text extraction service
    depends_on:
      ocis-init:
        condition: service_completed_successfully
      tika:
        condition: service_healthy

    # Connectivity: Internal communication and public proxy exposure
    networks:
      - ocis-internal
      - traefik-public

    # Configuration: Core oCIS environment variables and features
    environment:
      OCIS_ADD_RUN_SERVICES: "notifications"
      OCIS_URL: "https://${OCIS_DOMAIN}"
      OCIS_LOG_LEVEL: "info"
      OCIS_LOG_COLOR: "false"
      OCIS_LOG_PRETTY: "false"
      PROXY_TLS: "false"
      GATEWAY_GRPC_ADDR: "0.0.0.0:9142"
      OCIS_INSECURE: "true"
      PROXY_ENABLE_BASIC_AUTH: "true"
      IDM_ADMIN_PASSWORD: "admin"
      IDM_CREATE_DEMO_USERS: "false"
      NOTIFICATIONS_SMTP_HOST: "${OCIS_SMTP_HOST}"
      NOTIFICATIONS_SMTP_PORT: "${OCIS_SMTP_PORT}"
      NOTIFICATIONS_SMTP_SENDER: "${OCIS_SMTP_SENDER}"
      NOTIFICATIONS_SMTP_USERNAME: "${OCIS_SMTP_USERNAME}"
      NOTIFICATIONS_SMTP_INSECURE: "false"
      MICRO_REGISTRY_ADDRESS: "127.0.0.1:9233"
      NATS_NATS_HOST: "0.0.0.0"
      NATS_NATS_PORT: "9233"
      PROXY_CSP_CONFIG_FILE_LOCATION: "/etc/ocis/csp.yaml"
      ONLYOFFICE_DOMAIN: "${OCIS_ONLYOFFICE_DOMAIN}"
      OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST: "banned-password-list.txt"
      SEARCH_EXTRACTOR_TYPE: "tika"
      SEARCH_EXTRACTOR_TIKA_TIKA_URL: "http://tika:9998"
      FRONTEND_FULL_TEXT_SEARCH_ENABLED: "true"

    # Execution: Initialize if needed, then start server
    entrypoint:
      - /bin/sh
    command: ["-c", "ocis init || true; exec ocis server"]

    # Routing: Traefik reverse proxy configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ocis.entrypoints=websecure"
      - "traefik.http.routers.ocis.rule=Host(`${OCIS_DOMAIN}`)"
      - "traefik.http.routers.ocis.service=ocis"
      - "traefik.http.services.ocis.loadbalancer.server.port=9200"

    # State: Persistent data, config overrides, and web apps
    volumes:
      - ${OCIS_CONFIG_DIR}:/etc/ocis
      - ${OCIS_DATA_DIR}:/var/lib/ocis
      - ./config/ocis/app-registry.yaml:/etc/ocis/app-registry.yaml
      - ./config/ocis/csp.yaml:/etc/ocis/csp.yaml
      - ./config/ocis/banned-password-list.txt:/etc/ocis/banned-password-list.txt
      - ocis-apps:/var/lib/ocis/web/assets/apps

    # Monitoring: Local logging driver
    logging:
      driver: local

  # --- Connector: oCIS to OnlyOffice ---
  collaboration-oo:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: owncloud/ocis:${OCIS_VERSION_TAG}
    container_name: ocis-collaboration-oo

    # Security: Run as non-root user
    user: "${PUID}:${GUID}"

    # Lifecycle: Wait for oCIS core and OnlyOffice to be ready
    depends_on:
      ocis:
        condition: service_started
      onlyoffice:
        condition: service_healthy

    # Connectivity: Internal communication and outbound requests
    networks:
      - ocis-internal
      - outbound-public

    # Configuration: Connector connection details
    environment:
      COLLABORATION_GRPC_ADDR: "0.0.0.0:9301"
      COLLABORATION_HTTP_ADDR: "0.0.0.0:9300"
      MICRO_REGISTRY: "nats-js-kv"
      MICRO_REGISTRY_ADDRESS: "ocis-internal:9233"
      COLLABORATION_WOPI_SRC: "http://collaboration-oo:9300"
      COLLABORATION_APP_NAME: "OnlyOffice"
      COLLABORATION_APP_PRODUCT: "OnlyOffice"
      COLLABORATION_APP_ADDR: "https://${OCIS_ONLYOFFICE_DOMAIN}"
      COLLABORATION_APP_ICON: "https://${OCIS_ONLYOFFICE_DOMAIN}/web-apps/apps/documenteditor/main/resources/img/favicon.ico"
      COLLABORATION_APP_INSECURE: "true"
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: "true"
      COLLABORATION_LOG_LEVEL: "info"
      OCIS_URL: "https://${OCIS_DOMAIN}"

    # Execution: Start the collaboration service
    command: ["collaboration", "server"]

    # State: Shared oCIS configuration
    volumes:
      - ${OCIS_CONFIG_DIR}:/etc/ocis

    # Monitoring: Local logging driver
    logging:
      driver: local

  # --- Document Server: OnlyOffice ---
  onlyoffice:
    image: onlyoffice/documentserver:${OCIS_ONLYOFFICE_VERSION_TAG}
    container_name: ocis-onlyoffice
    restart: always

    # Connectivity: Internal communication and public proxy exposure
    networks:
      - ocis-internal
      - traefik-public

    # Configuration: Document server core settings
    environment:
      WOPI_ENABLED: "true"
      USE_UNAUTHORIZED_STORAGE: "true"
      JWT_ENABLED: "false"
      REDIS_SERVER_HOST: "localhost"
      REDIS_SERVER_PORT: "6379"

    # Execution: Run custom entrypoint script
    entrypoint:
      - /bin/sh
      - /entrypoint-override.sh

    # Routing: Traefik reverse proxy configuration with middleware
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onlyoffice.entrypoints=websecure"
      - "traefik.http.routers.onlyoffice.rule=Host(`${OCIS_ONLYOFFICE_DOMAIN:-onlyoffice.owncloud.test}`)"
      - "traefik.http.routers.onlyoffice.service=onlyoffice"
      - "traefik.http.services.onlyoffice.loadbalancer.server.port=80"
      - "traefik.http.middlewares.onlyoffice.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.onlyoffice.middlewares=onlyoffice"

    # State: Mount custom scripts and local configuration
    volumes:
      - ./config/onlyoffice/entrypoint-override.sh:/entrypoint-override.sh
      - ./config/onlyoffice/local.json:/etc/onlyoffice/documentserver/local.dist.json

    # Monitoring: Healthcheck and local logging driver
    logging:
      driver: local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/hosting/discovery"]
      start_period: 120s
      interval: 10s
      timeout: 5s
      retries: 3


# --- Global Network Definitions ---
networks:
  traefik-public:
  outbound-public:
  ocis-internal:
    name: ocis-internal

# --- Global Volumes ---
volumes:
  ocis-apps: