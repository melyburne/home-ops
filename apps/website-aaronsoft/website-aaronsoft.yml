services:
  # --- Main Web Service ---
  website-aaronsoft:
    extends:
      file: ../../core/templates.yml
      service: base-secure
    image: ghcr.io/kartoffelbauer/web-aaronsoft:${WEB_AARONSOFT_DOCKER_TAG:-latest}
    container_name: website-aaronsoft

    # Security: Lock the filesystem
    read_only: true

    # Connectivity: Attach to the shared reverse proxy network
    networks:
      - traefik-public

    # Routing: Traefik dynamic configuration (Alphabetized)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-aaronsoft.entrypoints=websecure"
      - "traefik.http.routers.web-aaronsoft.rule=${WEB_AARONSOFT_HOST_RULE:-Host(`aaronsoft.localhost`)}"
      - "traefik.http.services.web-aaronsoft.loadbalancer.server.port=8080"

    # State: In-memory mounts explicitly required for Nginx to run on a read-only filesystem
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    # Monitoring: Internal check to ensure the web server is actually responding
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]


# --- Global Network Definitions ---
networks:
  traefik-public: