# --- Healthcheck: Default values ---
x-healthcheck-defaults: &healthcheck-defaults
  start_period: 120s
  interval: 15s
  timeout: 10s
  retries: 3

x-outbound-dependencies: &outbound-dependencies
  depends_on:
    pihole:
      condition: service_healthy

 # --- Init Service: Templates for preparing permissions ---
services:
  base-init:
    image: busybox:${BUSYBOX_DOCKER_TAG:-1.37}

    # Lifecycle: Tell Watchtower to ignore all containers using this template
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    # Connectivity: Attach to no network
    network_mode: none

    # Security: Lock the filesystem, drop all privileges, and add only required ones back
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE

    # Environment: Set the timezone for all containers using this template
    environment:
      TZ: "${TZ:-Etc/UTC}"

    # --- Basic Outbound Init Service: For containers requiring active internet/DNS ---
    base-init-outbound:
      extends:
        service: base-init
      <<: *outbound-dependencies

  # --- Basic Service Base: Template for basic containers ---
  base-default:
    restart: unless-stopped

    # Monitoring: Keep logs locally and rotate them automatically
    logging:
      driver: local

    # Healthcheck: Inject the anchor locally
    healthcheck:
      <<: *healthcheck-defaults

  # --- Basic Outbound Dependent Base: For containers requiring active internet/DNS ---
  base-default-outbound:
    extends:
      service: base-default
    <<: *outbound-dependencies

  # --- Secure Service Base: Template for secure containers ---
  base-secure:
    restart: unless-stopped

    # Monitoring: Keep logs locally and rotate them automatically
    logging:
      driver: local

    # Security: Drop all privileges by default
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # Environment: Set the timezone for all containers using this template
    environment:
      TZ: "${TZ:-Etc/UTC}"

    # Healthcheck: Inject the anchor locally
    healthcheck:
      <<: *healthcheck-defaults

  # --- Secure Outbound Dependent Base: For containers requiring active internet/DNS ---
  base-secure-outbound:
    extends:
      service: base-secure
    <<: *outbound-dependencies