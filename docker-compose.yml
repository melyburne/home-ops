# --- Global Project Definition ---
name: home-ops

# --- Modular Service Includes ---
# Imports all standalone Docker Compose configurations into this master stack
include:
  # 1. Network & Routing Tier
  - core/routing/ddns-updater/ddns-updater.yml
  - core/routing/traefik/traefik.yml

  # 2. Database Tier
  - core/database/mariadb/mariadb.yml
  - core/database/adminer/adminer.yml

  # 3. System & Maintenance Tier
  - core/system/avahi/avahi.yml
  - core/system/fallback/fallback.yml
  - core/system/watchtower/watchtower.yml

  # 4. End-User Applications
  - apps/home-assistant/home-assistant.yml
  - apps/roundcube/roundcube.yml
  - apps/ocis/ocis.yml
  - apps/websites/web-aaronsoft/web-aaronsoft.yml
  - apps/websites/web-get-orga-niced/web-get-orga-niced.yml

# --- Global Network Definitions ---
networks:
  # Connectivity: Public traffic routing from the reverse proxy to exposed applications
  traefik-public:
    name: traefik-public
    driver: bridge

  # Connectivity: Outbound internet access for services requiring external APIs (e.g., Watchtower, DDNS)
  outbound-public:
    name: outbound-public
    driver: bridge

  # Security: Highly restricted internal network strictly for Traefik to read the Docker socket via proxy
  socket-internal:
    name: socket-internal
    internal: true

  # Security: Isolated internal network preventing direct outside access to backend databases
  mariadb-internal:
    name: mariadb-internal
    internal: true