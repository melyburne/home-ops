services:
  # --- Init Service: Prepares permissions for MariaDB ---
  mariadb-init:
    extends:
      file: ../templates.yml
      service: base-init
    container_name: mariadb-init
    command: sh -c "mkdir -p /var/lib/mysql && chown -R ${PUID}:${GUID} /var/lib/mysql"
    volumes:
      - ./data:/var/lib/mysql

  # --- Database Service ---
  mariadb:
    extends:
      file: ../templates.yml
      service: base-service-secure
    image: mariadb:${MARIADB_VERSION_TAG}
    container_name: mariadb

    # Security: Run as non-root user
    user: "${PUID}:${GUID}"

    # Lifecycle: Wait for permissions to be fixed
    depends_on:
      mariadb-init:
        condition: service_completed_successfully

    # Connectivity: Isolated internal network to prevent direct outside access
    networks:
      - mariadb-internal

    # Configuration: Natively auto-creates the Roundcube database and user on first startup
    environment:
      # Core Database Settings
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_AUTO_UPGRADE=true

      # App 1: Roundcube Variables (Read by 01-init-roundcube.sh)
      - ROUNDCUBE_DB_NAME=${ROUNDCUBE_DB_NAME}
      - ROUNDCUBE_DB_USER=${ROUNDCUBE_DB_USER}
      - ROUNDCUBE_DB_PASSWORD=${ROUNDCUBE_DB_PASSWORD}

      # App 2: OnlyOffice Variables (Read by 02-init-onlyoffice.sh)
      - ONLYOFFICE_DB_NAME=${OCIS_ONLYOFFICE_DB_NAME}
      - ONLYOFFICE_DB_USER=${OCIS_ONLYOFFICE_DB_USER}
      - ONLYOFFICE_DB_PASSWORD=${OCIS_ONLYOFFICE_DB_PASSWORD}

    # State: Persistent folder mounts and required in-memory directories for read-only filesystem
    volumes:
      - ./data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /tmp
      - /run/mysqld

    # Security: Lock filesystem
    read_only: true

    # Monitoring: Built-in check to ensure the InnoDB engine is fully initialized
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]


# --- Global Network Definitions ---
networks:
  mariadb-internal: