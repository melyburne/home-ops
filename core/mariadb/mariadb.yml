services:
  # --- Init Service: Prepares permissions for MariaDB ---
  mariadb-init:
    extends:
      file: ../templates.yml
      service: base-init
    container_name: mariadb-init
    command: sh -c "mkdir -p /var/lib/mysql && chown -R ${PUID}:${GUID} /var/lib/mysql"
    volumes:
      - ./data:/var/lib/mysql

  # --- Database Service ---
  mariadb:
    image: mariadb:${MARIADB_VERSION_TAG}
    container_name: mariadb
    restart: unless-stopped
    
    # Security: Run as non-root user
    user: "${PUID}:${GUID}"

    # Lifecycle: Wait for permissions to be fixed
    depends_on:
      mariadb-init:
        condition: service_completed_successfully

    # Connectivity: Isolated internal network to prevent direct outside access
    networks:
      - mariadb-internal

    # Configuration: Natively auto-creates the Roundcube database and user on first startup
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${ROUNDCUBE_MYSQL_DATABASE}
      - MARIADB_USER=${ROUNDCUBE_MYSQL_USER}
      - MARIADB_PASSWORD=${ROUNDCUBE_MYSQL_PASSWORD}
      - MARIADB_AUTO_UPGRADE=true

    # State: Persistent data mount and required in-memory directories for read-only filesystem
    volumes:
      - ./data:/var/lib/mysql
    tmpfs:
      - /tmp
      - /run/mysqld

    # Security: Hardened container, fully locked down filesystem, ZERO capabilities
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

    # Monitoring: Built-in check to ensure the InnoDB engine is fully initialized
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5


# --- Global Network Definitions ---
networks:
  mariadb-internal: