services:
  # --- Main Service: Watchtower Auto-Updater ---
  watchtower:
    extends:
      file: ../templates.yml
      service: base-secure
    image: nickfedor/watchtower:${WATCHTOWER_DOCKER_TAG:-latest}
    container_name: watchtower

    # Security: Run as non-root user, grant Docker socket group permissions
    user: "${PUID:-1000}:${GUID:-1000}"
    group_add:
      - "${DOCKER_SOCKET_GID:-987}"

    # Connectivity: Needs outbound internet to check registries for updates
    networks:
      - outbound-public

    # Configuration: Barebones automatic updates
    environment:
      WATCHTOWER_LOG_LEVEL: "info"
      WATCHTOWER_POLL_INTERVAL: "${WATCHTOWER_POLL_INTERVAL:-900}"
      WATCHTOWER_INCLUDE_STOPPED: "true"
      WATCHTOWER_CLEANUP: "true"

    # State: Direct socket mount and in-memory mounts explicitly required for read-only filesystem
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp
      - /etc/cron.d

    # Security: Lock filesystem
    read_only: true


# --- Global Network Definitions ---
networks:
  outbound-public: