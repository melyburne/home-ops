services:
  # --- Main Service: Watchtower Auto-Updater ---
  watchtower:
    extends:
      file: ../templates.yml
      service: base-secure
    image: nickfedor/watchtower:${WATCHTOWER_VERSION_TAG}
    container_name: watchtower

    # Security: Run as non-root user, grant Docker socket group permissions
    user: "${PUID}:${GUID}"
    group_add:
      - "${SOCKET_GID}"

    # Connectivity: Needs outbound internet to check registries for updates
    networks:
      - outbound-public

    # Configuration: Barebones automatic updates
    environment:
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL}
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LOG_LEVEL=info

    # State: Direct socket mount required for triggering updates
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    # In-memory mounts explicitly required for a read-only filesystem
    tmpfs:
      - /tmp
      - /etc/cron.d

    # Security: Lock filesystem
    read_only: true


# --- Global Network Definitions ---
networks:
  outbound-public: