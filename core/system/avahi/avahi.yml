
  # --- Main Service: mDNS Reflector (Avahi) ---
  avahi:
    extends:
      file: ../../../shared/templates.yml
      service: base-default
    image: flungo/avahi:${AVAHI_DOCKER_TAG:-latest}
    container_name: avahi

    # Connectivity: network_mode host is mandatory for mDNS/Multicast discovery
    network_mode: host

    # Configuration: Reflector settings (Alphabetized)
    environment:
      REFLECTOR_ENABLE_REFLECTOR: "yes"
      TZ: "${TZ:-Etc/UTC}"