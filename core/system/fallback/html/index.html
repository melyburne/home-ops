<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Offline | Maintenance</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cstyle%3Epath%7Bstroke:%233b82f6;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;%7D@media(prefers-color-scheme:dark)%7Bpath%7Bstroke:%2360a5fa;%7D%7D%3C/style%3E%3Cpath d='M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z'/%3E%3C/svg%3E">

    <style>
        /* --- 1. Theme Variables (DRY) --- */
        :root {
            /* Light Mode (Default) */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --accent-color: #3b82f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Auto-Switching Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --accent-color: #60a5fa;
                --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            }
        }

        /* --- 2. CSS Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* --- 3. Layout & Typography --- */
        body {
            /* Uses native system fonts for maximum performance */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            /* Smooth transitioning when OS switches themes */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .fallback-container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        h1 { font-size: 2.2rem; margin-bottom: 1rem; }
        p { font-size: 1.1rem; line-height: 1.6; color: var(--text-secondary); margin-bottom: 1.5rem; }

        .refresh-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--accent-color);
            margin-bottom: 0;
        }

        /* --- 4. Icon & Animation --- */
        .maintenance-icon {
            width: 72px;
            height: 72px;
            margin-bottom: 1.5rem;
            /* DRY: Stroke color is driven by the CSS variable, not hardcoded in HTML */
            stroke: var(--accent-color);
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.8; }
        }
    </style>

    <script>
        // --- Clean Code JavaScript ---
        document.addEventListener('DOMContentLoaded', () => {
            // Configuration Object prevents "Magic Numbers"
            const CONFIG = {
                elementId: 'countdown',
                durationSeconds: 30,
                intervalMs: 1000
            };

            const countdownElement = document.getElementById(CONFIG.elementId);
            let timeLeft = CONFIG.durationSeconds;

            // Defensive programming: don't run if the DOM element is missing
            if (!countdownElement) return;

            const timerInterval = setInterval(() => {
                timeLeft -= 1;
                countdownElement.textContent = timeLeft;

                if (timeLeft <= 0) {
                    // Prevent memory leaks by clearing the interval before reloading
                    clearInterval(timerInterval);
                    window.location.reload(true);
                }
            }, CONFIG.intervalMs);
        });
    </script>
</head>
<body>
    <main class="fallback-container">
        <svg class="maintenance-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
        </svg>

        <h1>We'll be right back!</h1>
        <p>This service is currently undergoing maintenance or is temporarily offline.</p>
        <p class="refresh-text">Checking for service in <span id="countdown">30</span> seconds...</p>
    </main>
</body>
</html>
