server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    # Hide Nginx version for security
    server_tokens off;

    # --- Gzip Compression ---
    gzip on;
    gzip_min_length 1000;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_vary on;

    root /usr/share/nginx/html;
    index index.html;

    # --- Global Security Headers ---
    include /etc/nginx/conf.d/security-headers.conf;

    # --- Silent Healthcheck Endpoint ---
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    # --- Routing ---
    # Catch all requests. If the file doesn't exist, serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Explicitly handle Nginx 404s by serving the fallback page
    error_page 404 /index.html;

    # --- Caching for Static Assets ---
    location ~* \.(css|js|svg)$ {
        # Re-include security headers so Cache-Control doesn't wipe them
        include /etc/nginx/conf.d/security-headers.conf;

        # Cache for 30 days
        add_header Cache-Control "public, no-transform, max-age=2592000";

        access_log off;
        log_not_found off;
    }
}