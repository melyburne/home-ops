services:
  # --- Main Web Service ---
  fallback:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: nginxinc/nginx-unprivileged:${NGINX_UNPRIVILEGED_DOCKER_TAG:-alpine}
    container_name: fallback

    # Security: Run as non-root user, lock the filesystem
    user: "${PUID:-1000}:${PGID:-1000}"
    read_only: true

    # Connectivity: Attach to the shared reverse proxy network
    networks:
      - traefik-public

    # Routing: Traefik configuration (Alphabetized)
    labels:
      # --- 1. Core Service Settings ---
      # Standard exception: 'enable' is traditionally always kept at the very top
      - "traefik.enable=true"
      - "traefik.http.services.fallback-svc.loadbalancer.server.port=8080"

      # Prevent Nginx 404s by forcing all sub-path traffic back to index.html
      - "traefik.http.middlewares.rewrite-to-index.replacepath.path=/"

      # --- 2. Fallback Routers (Trigger when known apps are offline) ---
      # Primary Domain
      - "traefik.http.routers.fallback-primary.entrypoints=websecure"
      - "traefik.http.routers.fallback-primary.middlewares=rewrite-to-index"
      - "traefik.http.routers.fallback-primary.priority=2"
      - "traefik.http.routers.fallback-primary.rule=Host(`${ADMINER_SUBDOMAIN:-adminer}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${HOMEASSISTANT_SUBDOMAIN:-home}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${OCIS_SUBDOMAIN:-ocis}.${DOMAIN_PRIMARY:-localhost}`) || Host(`onlyoffice.${DOMAIN_PRIMARY:-localhost}`) || Host(`${PIHOLE_SUBDOMAIN:-pihole}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${ROUNDCUBE_SUBDOMAIN:-mail}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${WEB_SUBDOMAIN:-www}.${DOMAIN_PRIMARY:-localhost}`)"
      - "traefik.http.routers.fallback-primary.service=fallback-svc"

    # State: Mount the HTML folder, Nginx server configs and the required temp dirs for Nginx
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./config/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    # Monitoring: Internal check targeting the new unprivileged port
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8080/healthz || exit 1"

networks:
  traefik-public: