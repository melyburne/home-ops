services:
  # --- Main Service: Watchtower Auto-Updater ---
  watchtower:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: nickfedor/watchtower:${WATCHTOWER_DOCKER_TAG:-latest}
    container_name: watchtower

    # Security: Run as non-root user, grant Docker socket group permissions, lock filesystem
    user: "${PUID:-1000}:${PGID:-1000}"
    group_add:
      - "${DOCKER_SOCKET_PGID:-987}"
    read_only: true

    # Connectivity: Needs outbound internet to check registries for updates
    networks:
      - outbound-public

    # Configuration: Barebones automatic updates (Alphabetized)
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "true"
      WATCHTOWER_LOG_LEVEL: "${WATCHTOWER_LOG_LEVEL:-info}"
      WATCHTOWER_POLL_INTERVAL: "${WATCHTOWER_POLL_INTERVAL:-900}"

    # State: Direct socket mount and in-memory mounts explicitly required for read-only filesystem
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp
      - /etc/cron.d


# --- Global Network Definitions ---
networks:
  outbound-public: