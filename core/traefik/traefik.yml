services:
  # --- Init Service: Prepares ACME config permissions before Traefik starts ---
  init-acme:
    image: busybox:1.36
    container_name: init-acme
    network_mode: none
    
    # State: Mounts the configuration to set strict permissions
    volumes:
      - ./data:/data
      - ./traefik_dynamic.yml:/traefik_dynamic.yml
    
    # Execution: Creates the file, sets ownership, and enforces 600 permissions for Let's Encrypt
    command: sh -c "touch /data/acme.json && chown ${PUID}:${GUID} /data/acme.json && chmod 600 /data/acme.json && chown ${PUID}:${SOCKET_GID} /traefik_dynamic.yml"
    
    # Security: Isolated execution with the minimum capabilities needed
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE

  # --- Security Proxy: Shields the Docker socket from direct access by Traefik ---
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: socket-proxy
    restart: unless-stopped

    # Connectivity: Internal network solely for Traefik to access the proxy
    networks:
      - socket-internal

    # Configuration: Explicitly allow listing containers, block everything else
    environment:
      CONTAINERS: 1

    # State: Read-only mount of the actual Docker socket, plus in-memory temp areas
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
      - /tmp

    # Security: Hardened container, drop all privileges
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- Main Reverse Proxy: Traefik ---
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    
    # Security: Run as non-root user
    user: "${PUID}:${GUID}"
    
    # Lifecycle: Wait for permissions to be fixed and socket proxy to start
    depends_on:
      init-acme:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_started
        
    # Connectivity: Public facing ports and internal network attachments
    ports:
      - "80:80"
      - "443:443"
    networks:
      - traefik-public
      - socket-internal

    # Configuration: Global environment variables
    environment:
      - GANDIV5_PERSONAL_ACCESS_TOKEN=${GANDIV5_PERSONAL_ACCESS_TOKEN}
      - LEGO_DISABLE_CNAME_SUPPORT=true

    # Execution: Core Traefik configuration (Providers, Entrypoints, Let's Encrypt)
    command:
      - "--log.level=INFO"
      - "--ping=true"
      - "--accesslog=true"
      - "--api.dashboard=true"

      # Docker Provider (via Proxy)
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.network=traefik-public"

      # File Provider
      - "--providers.file.filename=/traefik_dynamic.yml"
      - "--providers.file.watch=true"

      # Entrypoints (HTTP automatically redirects to HTTPS)
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # --- Let's Encrypt Staging (DNS Challenge) ---
      # Remember to remove "-staging" from the caServer URL when moving to production!
      - "--certificatesresolvers.myresolver.acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.myresolver.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/data/acme.json"
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=gandiv5"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.propagation.delayBeforeChecks=10s"

    # Routing: Internal dashboard exposure configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=${TRAEFIK_DASHBOARD_HOST_RULE}"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=sec-public@file,dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS}"

    # State: Persistent data and dynamic config mounts
    volumes:
      - ./data:/data
      - ./traefik_dynamic.yml:/traefik_dynamic.yml:ro
    tmpfs: [/tmp]

    # Security: Drop root capabilities except port binding, lock filesystem
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    
    # Monitoring: Internal Traefik ping check
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# --- Global Network Definitions ---
networks:
  traefik-public:
    name: traefik-public
  socket-internal:
    name: socket-internal