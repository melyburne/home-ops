# --- Healthcheck: Default values ---
x-healthcheck-defaults: &healthcheck-defaults
  start_period: 120s
  interval: 15s
  timeout: 10s
  retries: 3

 # --- Init Service: Templates for preparing permissions ---
services:
  base-init:
    image: busybox:${BUSYBOX_DOCKER_TAG:-latest}

    # Routing/Labels: Tell Watchtower to ignore all containers using this template
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    # Connectivity: Attach to no network
    network_mode: none

    # Security: Lock the filesystem, drop all privileges, and add only required ones back
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE

  # --- Basic Service Base: Template for basic containers ---
  base-default:
    restart: unless-stopped

    # Healthcheck: Inject the anchor locally
    healthcheck:
      <<: *healthcheck-defaults

  # --- Secure Service Base: Template for secure containers ---
  base-secure:
    restart: unless-stopped

    # Security: Drop all privileges by default
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # Healthcheck: Inject the anchor locally
    healthcheck:
      <<: *healthcheck-defaults