services:
  # Fix file permissions at startup
  init-gandi-ddns:
    image: busybox:1.36
    container_name: init-gandi-ddns
    command: sh -c "chown -R ${PUID}:${GUID} /data"
    volumes:
      - ./data:/data
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true

  ddns-updater:
    image: qmcgaw/ddns-updater
    container_name: ddns-updater
    restart: unless-stopped
    user: "${PUID}:${GUID}"
    depends_on:
      init-gandi-ddns:
        condition: service_completed_successfully

    # Security Hardening: Drop all capabilities & Read-only FS
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # Persist state to prevent API spam on container restarts
    volumes:
      - ./data:/updater/data
    env_file:
      - ../../.env
    environment:
      - LISTENING_ADDRESS=127.0.0.1
      - UPDATE_PERIOD=5m
      # Record 1: aaronsoft.de
      - RECORD1=aaronsoft.de,@,gandi,ttl:10800,key=${GANDI_PERSONAL_ACCESS_TOKEN}
      # Record 2: get-orga-niced.de
      - RECORD2=get-orga-niced.de,@,gandi,ttl:10800,key=${GANDI_PERSONAL_ACCESS_TOKEN}

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/"]
      interval: 5m
      timeout: 10s
      retries: 3