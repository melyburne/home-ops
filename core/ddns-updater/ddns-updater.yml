services:
  # --- Init Service: Prepares the environment before the main application starts ---
  init-gandi-ddns:
    extends:
      file: ../templates.yml
      service: init-base
    container_name: init-gandi-ddns
    command: sh -c "chown -R ${PUID}:${GUID} /data"
    volumes:
      - ./data:/data

  # --- Main Service: Handles the dynamic DNS updates ---
  ddns-updater:
    image: qmcgaw/ddns-updater:${DDNS_UPDATER_VERSION_TAG}
    container_name: ddns-updater
    restart: unless-stopped
    user: "${PUID}:${GUID}"

    # Connectivity: Attach to the shared outbound traffic
    networks:
      - outbound-traffic
    
    # Ensures permissions are fixed before the updater attempts to write to the volume
    depends_on:
      init-gandi-ddns:
        condition: service_completed_successfully

    # Configuration: Global environment variables
    environment:
      - SERVER_ENABLED=false
      - CONFIG={"settings":[{"provider":"gandi","domain":"aaronsoft.de","ttl":10800,"ip_version":"ipv4","personal_access_token":"${GANDIV5_PERSONAL_ACCESS_TOKEN}"},{"provider":"gandi","domain":"get-orga-niced.de","ttl":10800,"ip_version":"ipv4","personal_access_token":"${GANDIV5_PERSONAL_ACCESS_TOKEN}"}]}

    # State persistence to prevent API rate limiting from Gandi on container restart
    volumes:
      - ./data:/updater/data
    tmpfs:
      - /tmp

    # Security: Hardened container dropping all root capabilities and locking the filesystem
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

# --- Global Network Definitions ---
networks:
  outbound-traffic: