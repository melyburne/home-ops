services:
  # --- Main Web Service ---
  fallback:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: nginxinc/nginx-unprivileged:${NGINX_UNPRIVILEGED_DOCKER_TAG:-alpine}
    container_name: fallback

    # Security: Run as non-root user, lock the filesystem
    user: "${PUID:-1000}:${PGID:-1000}"
    read_only: true

    # Connectivity: Attach to the shared reverse proxy network
    networks:
      - traefik-public

    # Routing: Traefik configuration (Alphabetized)
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.fallback-svc.loadbalancer.server.port=8080"

      # ----------------------------------------------------------------------
      # MIDDLEWARES HOSTED BY THIS CONTAINER
      # ----------------------------------------------------------------------
      - "traefik.http.middlewares.rewrite-to-index.replacepath.path=/"

      # The 502/504 Error Catcher (Moved from dynamic.yml to here!)
      - "traefik.http.middlewares.error-pages-fallback.errors.status=502-504"
      - "traefik.http.middlewares.error-pages-fallback.errors.service=fallback-svc"
      - "traefik.http.middlewares.error-pages-fallback.errors.query=/"

      # ----------------------------------------------------------------------
      # PRIORITY 2: THE FALLBACK ROUTES (Trigger when known apps are stopped)
      # ----------------------------------------------------------------------
      # Primary Domain
      - "traefik.http.routers.fallback-primary.rule=Host(`${WEB_SUBDOMAIN:-www}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${ROUNDCUBE_SUBDOMAIN:-mail}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${OCIS_SUBDOMAIN:-ocis}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${ADMINER_SUBDOMAIN:-adminer}.${DOMAIN_PRIMARY:-localhost}`)"
      - "traefik.http.routers.fallback-primary.priority=2"
      - "traefik.http.routers.fallback-primary.entrypoints=websecure"
      - "traefik.http.routers.fallback-primary.middlewares=rewrite-to-index"
      - "traefik.http.routers.fallback-primary.service=fallback-svc"
      - "traefik.http.routers.fallback-primary.tls.certresolver=myresolver"

      # Secondary Domain
      - "traefik.http.routers.fallback-secondary.rule=Host(`${WEB_SUBDOMAIN:-www}.${DOMAIN_SECONDARY:-localhost}`) || Host(`${ROUNDCUBE_SUBDOMAIN:-mail}.${DOMAIN_SECONDARY:-localhost}`) || Host(`${ADMINER_SUBDOMAIN:-adminer}.${DOMAIN_SECONDARY:-localhost}`)"
      - "traefik.http.routers.fallback-secondary.priority=2"
      - "traefik.http.routers.fallback-secondary.entrypoints=websecure"
      - "traefik.http.routers.fallback-secondary.middlewares=rewrite-to-index"
      - "traefik.http.routers.fallback-secondary.service=fallback-svc"
      - "traefik.http.routers.fallback-secondary.tls.certresolver=myresolver"

    # State: Mount the HTML folder and required temp dirs for Nginx
    volumes:
      - ./html:/usr/share/nginx/html:ro
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    # Monitoring: Internal check targeting the new unprivileged port
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"

networks:
  traefik-public: