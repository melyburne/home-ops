services:
  # --- Init Service: Prepares ACME config permissions before Traefik starts ---
  traefik-init:
    extends:
      file: ../../../shared/templates.yml
      service: base-init
    container_name: traefik-init

    # Execution: Touch file and fix permissions
    command: sh -c "touch /data/acme.json && chown -R ${TRAEFIK_PUID:-1001}:${TRAEFIK_PGID:-1001} /data && chmod 600 /data/acme.json"

    # State: Mount data directory
    volumes:
      - ./data:/data

  # --- Security Proxy: Shields the Docker socket from direct access by Traefik ---
  traefik-socket-proxy:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: tecnativa/docker-socket-proxy:latest
    container_name: traefik-socket-proxy

    # Security: Hardened container, lock filesystem
    read_only: true

    # Connectivity: Internal network solely for Traefik to access the proxy
    networks:
      - socket-internal

    # Configuration: Explicitly allow listing containers, block everything else (Alphabetized)
    environment:
      CONTAINERS: "1"
      LOG_LEVEL: "notice"
      PING: "1"

    # State: Read-only mount of the actual Docker socket, plus in-memory temp areas
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
      - /tmp

    # Monitoring: Native internal HTTP ping check
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:2375/_ping || exit 1"

  # --- Main Reverse Proxy: Traefik ---
  traefik:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: traefik:${TRAEFIK_DOCKER_TAG:-v3}
    container_name: traefik

    # Security: Run as non-root user, lock filesystem, add port capabilities
    user: "${TRAEFIK_PUID:-1001}:${TRAEFIK_PGID:-1001}"
    read_only: true
    cap_add:
      - NET_BIND_SERVICE

    # Lifecycle: Wait for permissions to be fixed and socket proxy to start
    depends_on:
      traefik-init:
        condition: service_completed_successfully
      traefik-socket-proxy:
        condition: service_healthy

    # Connectivity: Public facing ports and network attachments
    ports:
      - "80:80"
      - "443:443"
    networks:
      traefik-public:
        aliases:
          - onlyoffice.${DOMAIN_PRIMARY:-localhost}
      socket-internal:

    # Configuration: Global environment variables (Alphabetized)
    environment:
      GANDIV5_PERSONAL_ACCESS_TOKEN: "${GANDIV5_PERSONAL_ACCESS_TOKEN:?}"
      LEGO_DISABLE_CNAME_SUPPORT: "true"

    # Execution: Core Traefik configuration (Alphabetized)
    command:
      # General (Dashboard, Logging, Ping)
      - "--api.dashboard=true"
      - "--api.disableDashboardAd=true"
      - "--log.level=INFO"
      - "--ping=true"

      # Docker Provider (via Proxy)
      - "--providers.docker.endpoint=tcp://traefik-socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--providers.docker=true"

      # File Provider
      - "--providers.file.filename=/config/dynamic.yml"
      - "--providers.file.watch=true"

      # Entrypoints (HTTP automatically redirects to HTTPS)
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.middlewares=sec-public@file"
      - "--entrypoints.websecure.http.tls=true"

      # --- oCIS specific Configuration ---
      - "--entryPoints.websecure.transport.respondingTimeouts.idleTimeout=3m"
      - "--entryPoints.websecure.transport.respondingTimeouts.readTimeout=12h"
      - "--entryPoints.websecure.transport.respondingTimeouts.writeTimeout=12h"
      - "--entryPoints.websecure.http.encodedCharacters.allowEncodedPercent=true"
      - "--entryPoints.websecure.http.encodedCharacters.allowEncodedQuestionMark=true"
      - "--entryPoints.websecure.http.encodedCharacters.allowEncodedSlash=true"

      # --- Let's Encrypt Staging (DNS Challenge) ---
      - "--certificatesresolvers.myresolver.acme.caServer=${TRAEFIK_ACME_CASERVER:-https://acme-staging-v02.api.letsencrypt.org/directory}"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.propagation.delayBeforeChecks=10s"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=gandiv5"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${TRAEFIK_ACME_EMAIL:?}"
      - "--certificatesresolvers.myresolver.acme.storage=/data/acme.json"

      # ----------------------------------------------------------------------
      # DYNAMIC REDIRECT MIDDLEWARE (Fully configurable via .env)
      # Note: We use $${1} so Docker Compose correctly passes ${1} to Traefik
      # ----------------------------------------------------------------------
      - "traefik.http.middlewares.redirect-to-web.redirectregex.regex=^https?://(?:[^/]+\\.)?([^/]+\\.[^/]+)/(.*)"
      - "traefik.http.middlewares.redirect-to-web.redirectregex.replacement=https://${WEB_SUBDOMAIN:-www}.$${1}/$${2}"
      - "traefik.http.middlewares.redirect-to-web.redirectregex.permanent=true"

      # ----------------------------------------------------------------------
      # PRIORITY 1: GLOBAL REDIRECTS (Naked Domains & Typos -> Web Subdomain)
      # ----------------------------------------------------------------------
      # Primary Domain Redirects
      - "traefik.http.routers.redirect-primary.rule=HostRegexp(`^.+\\.${DOMAIN_PRIMARY:-localhost}$$`) || Host(`${DOMAIN_PRIMARY:-localhost}`)"
      - "traefik.http.routers.redirect-primary.priority=1"
      - "traefik.http.routers.redirect-primary.entrypoints=websecure"
      - "traefik.http.routers.redirect-primary.middlewares=redirect-to-web"
      - "traefik.http.routers.redirect-primary.service=noop@internal"
      - "traefik.http.routers.redirect-primary.tls.certresolver=myresolver"
      - "traefik.http.routers.redirect-primary.tls.domains[0].main=${DOMAIN_PRIMARY:-localhost}"
      - "traefik.http.routers.redirect-primary.tls.domains[0].sans=*.${DOMAIN_PRIMARY:-localhost}"

      # Secondary Domain Redirects
      - "traefik.http.routers.redirect-secondary.rule=HostRegexp(`^.+\\.${DOMAIN_SECONDARY:-localhost}$$`) || Host(`${DOMAIN_SECONDARY:-localhost}`)"
      - "traefik.http.routers.redirect-secondary.priority=1"
      - "traefik.http.routers.redirect-secondary.entrypoints=websecure"
      - "traefik.http.routers.redirect-secondary.middlewares=redirect-to-web"
      - "traefik.http.routers.redirect-secondary.service=noop@internal"
      - "traefik.http.routers.redirect-secondary.tls.certresolver=myresolver"
      - "traefik.http.routers.redirect-secondary.tls.domains[0].main=${DOMAIN_SECONDARY:-localhost}"
      - "traefik.http.routers.redirect-secondary.tls.domains[0].sans=*.${DOMAIN_SECONDARY:-localhost}"

    # Routing: Internal dashboard exposure configuration (Alphabetized)
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS:?}"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_SUBDOMAIN:-traefik}.${DOMAIN_PRIMARY:-localhost}`) || Host(`${TRAEFIK_SUBDOMAIN:-traefik}.${DOMAIN_SECONDARY:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"

    # State: Persistent data and dynamic config mounts
    volumes:
      - ./data:/data
      - ./config/dynamic.yml:/config/dynamic.yml:ro
    tmpfs:
      - /tmp

    # Monitoring: Native internal HTTP ping check
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8080/ping || exit 1"


# --- Global Network Definitions ---
networks:
  traefik-public:
  socket-internal: