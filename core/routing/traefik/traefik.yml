services:
  # --- Init Service: Prepares ACME config permissions before Traefik starts ---
  traefik-init:
    extends:
      file: ../../../shared/templates.yml
      service: base-init
    container_name: traefik-init

    # Execution: Touch file and fix permissions
    command: sh -c "touch /data/acme.json && chown -R ${TRAEFIK_PUID:-1001}:${TRAEFIK_PGID:-1001} /data && chmod 600 /data/acme.json"

    # State: Mount data directory
    volumes:
      - ./data:/data

  # --- Security Proxy: Shields the Docker socket from direct access by Traefik ---
  traefik-socket-proxy:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: tecnativa/docker-socket-proxy:latest
    container_name: traefik-socket-proxy

    # Security: Hardened container, lock filesystem
    read_only: true

    # Connectivity: Internal network solely for Traefik to access the proxy
    networks:
      - socket-internal

    # Configuration: Explicitly allow listing containers & events, block everything else (Alphabetized)
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      LOG_LEVEL: "warning"
      PING: "1"

    # State: Read-only mount of the actual Docker socket, plus in-memory temp areas
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
      - /tmp

    # Monitoring: Native internal HTTP ping check
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:2375/_ping || exit 1"

  # --- Main Reverse Proxy: Traefik ---
  traefik:
    extends:
      file: ../../../shared/templates.yml
      service: base-secure
    image: traefik:${TRAEFIK_DOCKER_TAG:-v3}
    container_name: traefik

    # Security: Run as non-root user, lock filesystem, add port capabilities
    user: "${TRAEFIK_PUID:-1001}:${TRAEFIK_PGID:-1001}"
    read_only: true
    cap_add:
      - NET_BIND_SERVICE

    # Lifecycle: Wait for permissions to be fixed and socket proxy to start
    depends_on:
      traefik-init:
        condition: service_completed_successfully
      traefik-socket-proxy:
        condition: service_healthy

    # Connectivity: Public facing ports and network attachments
    ports:
      - "80:80"
      - "443:443"
    networks:
      traefik-public:
        aliases:
          - ${OCIS_SUBDOMAIN:-ocis}.${DOMAIN_PRIMARY:-localhost}
          - onlyoffice.${DOMAIN_PRIMARY:-localhost}
      socket-internal:

    # Configuration: Global environment variables (Alphabetized)
    environment:
      DOMAIN_PRIMARY: "${DOMAIN_PRIMARY:-localhost}"
      CLOUDFLARE_DNS_API_TOKEN: "${CLOUDFLARE_TOKEN:?}"
      HOMEASSISTANT_SUBDOMAIN: "${HOMEASSISTANT_SUBDOMAIN:-home}"
      LEGO_DISABLE_CNAME_SUPPORT: "true"
      TRAEFIK_LOG_LEVEL: "${TRAEFIK_LOG_LEVEL:-info}"

    # Execution: Core Traefik configuration (Alphabetized)
    command:
      # --- 1. CORE SYSTEM SETTINGS (API, Logging, Healthchecks) ---
      - "--api.dashboard=true"
      - "--api.disableDashboardAd=true"
      - "--ping=true"

      # --- 2. ENTRYPOINTS (Network Ports & Global Routing) ---
      # HTTP (80): Redirects
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"

      # HTTPS (443): Core Entrypoint & oCIS Overrides
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.encodedCharacters.allowEncodedPercent=true"
      - "--entrypoints.websecure.http.encodedCharacters.allowEncodedQuestionMark=true"
      - "--entrypoints.websecure.http.encodedCharacters.allowEncodedSlash=true"
      - "--entrypoints.websecure.http.middlewares=sec-public@file"
      - "--entrypoints.websecure.http.tls.certresolver=resolver"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=3m"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=12h"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=12h"

      # --- 3. PROVIDERS (Backend Discovery & Dynamic Configuration) ---
      # Docker Provider
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://traefik-socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"

      # File Provider
      - "--providers.file.directory=/config"
      - "--providers.file.watch=true"

      # --- 4. CERTIFICATE RESOLVERS (Let's Encrypt via DNS-01 Challenge) ---
      - "--certificatesresolvers.resolver.acme.caServer=${TRAEFIK_ACME_CASERVER:-https://acme-staging-v02.api.letsencrypt.org/directory}"
      - "--certificatesresolvers.resolver.acme.dnschallenge=true"
      - "--certificatesresolvers.resolver.acme.dnschallenge.propagation.delayBeforeChecks=10s"
      - "--certificatesresolvers.resolver.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.resolver.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.resolver.acme.email=${TRAEFIK_ACME_EMAIL:?}"
      - "--certificatesresolvers.resolver.acme.storage=/data/acme.json"

    # Routing: Dashboard exposure & Global redirect configuration (Alphabetized)
    labels:
      # --- 1. Core Service Settings ---
      - "traefik.enable=true"

      # --- 2. Middlewares Hosted by this Service ---
      # Secure the Traefik dashboard with Basic Authentication
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS:?}"

      # Dynamic Redirect Middleware: Forwards traffic to the preferred web subdomain
      - "traefik.http.middlewares.redirect-to-web.redirectregex.permanent=true"
      - "traefik.http.middlewares.redirect-to-web.redirectregex.regex=^https?://(?:[^/]+\\.)?([^/]+\\.[^/]+)/(.*)"
      - "traefik.http.middlewares.redirect-to-web.redirectregex.replacement=https://${WEB_SUBDOMAIN:-www}.$${1}/$${2}"

      # --- 3. Routers ---
      # Internal Dashboard Router
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_SUBDOMAIN:-traefik}.${DOMAIN_PRIMARY:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"

      # Priority 1: Primary Domain Global Redirects (Naked domains & Typos -> Web Subdomain)
      - "traefik.http.routers.redirect-primary.entrypoints=websecure"
      - "traefik.http.routers.redirect-primary.middlewares=redirect-to-web"
      - "traefik.http.routers.redirect-primary.priority=1"
      - "traefik.http.routers.redirect-primary.rule=HostRegexp(`^.+\\.${DOMAIN_PRIMARY:-localhost}$$`) || Host(`${DOMAIN_PRIMARY:-localhost}`)"
      - "traefik.http.routers.redirect-primary.service=noop@internal"
      - "traefik.http.routers.redirect-primary.tls.domains[0].main=${DOMAIN_PRIMARY:-localhost}"
      - "traefik.http.routers.redirect-primary.tls.domains[0].sans=*.${DOMAIN_PRIMARY:-localhost}"

    # State: Persistent data, routing infrastructure map, and temporary in-memory systems
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
      - ./config:/config:ro
    tmpfs:
      - /tmp

    # Monitoring: Native internal HTTP ping check
    healthcheck:
      test: "wget -qO /dev/null http://127.0.0.1:8080/ping || exit 1"


# --- Global Network Definitions ---
networks:
  traefik-public:
  socket-internal: