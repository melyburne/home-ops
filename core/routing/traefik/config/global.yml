# ==============================================================================
# Global Configuration: Security & Routing Policies
# Description: Defines reusable security constraints and TLS hardening applied
#              across the entire Traefik environment.
# ==============================================================================
http:
  middlewares:
    # --- 1. Traffic Control ---
    # Mitigates basic DDoS attacks and prevents brute-force login attempts
    rate-limit:
      rateLimit:
        average: 100
        burst: 300

    # --- 2. Security Headers ---
    # Enforces HTTP Strict Transport Security (HSTS) to guarantee HTTPS connections
    sec-transport:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true

    # --- 3. Global Chains ---
    # Master middleware pipeline attached to the main websecure entrypoint
    sec-public:
      chain:
        middlewares:
          - sec-transport
          - rate-limit
          # Integrates the standalone Nginx fallback container for 502/504 errors
          - error-pages-fallback@docker

# ==============================================================================
# Global Configuration: TLS / SSL Standards
# ==============================================================================
tls:
  options:
    default:
      # Hardens security by dropping deprecated protocols (TLS 1.0/1.1) and weak ciphers
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305