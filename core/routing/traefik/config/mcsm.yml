# ==============================================================================
# External Services: Minecraft Server Management (MCSM)
# Description: Reverse proxies traffic exiting the Docker stack to a standalone
#              bare-metal or VM node on the local network (192.168.1.6).
# ==============================================================================
http:
  # --- Ingress: Domain Mapping ---
  routers:
    # Primary Web Interface: MCSManager Control Panel
    mscm-panel:
      entryPoints:
        - websecure
      rule: "Host(`mc.aaronsoft.de`)"
      service: mscm-panel-svc

    # Backend Node Agent: MCSManager Daemon (Handles terminal & WebSocket traffic)
    mscm-daemon:
      entryPoints:
        - websecure
      rule: "Host(`mc-daemon.aaronsoft.de`)"
      service: mscm-daemon-svc

    # Public Application: BlueMap 3D Web Map
    bluemap:
      entryPoints:
        - websecure
      rule: "Host(`mc-map.aaronsoft.de`)"
      service: bluemap-svc

  # --- Egress: Local Network Forwarding ---
  services:
    mscm-panel-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.6:23333"

    mscm-daemon-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.6:24444"

    bluemap-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.6:8080"