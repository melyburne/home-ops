# ==============================================================================
# External Services: Home Assistant (Host Networked)
# Description: Reverse proxies traffic exiting the Docker stack to the local
#              host system where Home Assistant is listening on port 8123.
# ==============================================================================
http:
  # --- Ingress: Domain Mapping ---
  routers:
    home-assistant:
      entryPoints:
        - websecure
      # Templating: Dynamische Evaluierung der Umgebungsvariablen zur Laufzeit
      rule: "Host(`{{ env "HOMEASSISTANT_SUBDOMAIN" }}.{{ env "DOMAIN_PRIMARY" }}`)"
      service: home-assistant-svc

  # --- Egress: Local Network Forwarding ---
  services:
    home-assistant-svc:
      loadBalancer:
        servers:
          - url: "http://{{ env "HOMEASSISTANT_HOST_IP" }}:8123"