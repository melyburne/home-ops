http:
  # -------------------------------------------------------------------------------------------------
  # 1. EXPLICIT SERVICES
  # -------------------------------------------------------------------------------------------------
  services:
    maintenance:
      loadBalancer:
        servers:
          - url: "http://maintenance:8080"

  # -------------------------------------------------------------------------------------------------
  # 2. MIDDLEWARES
  # -------------------------------------------------------------------------------------------------
  middlewares:
    # --- Universal Domain-Independent Redirect ---
    redirect-to-www:
      redirectRegex:
        regex: "^https?://(?:[^/]+\\.)?([^/]+\\.[^/]+)/(.*)"
        replacement: "https://www.${1}/${2}"
        permanent: true

    # Go back to main page
    rewrite-to-index:
      replacePath:
        path: "/"

    # Rate limiting
    rate-limit:
      rateLimit:
        average: 100
        burst: 300

    # Security headers
    sec-transport:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true

    # Error Handling (Catches internal 502/503/504 errors on running apps)
    error-pages:
      errors:
        status:
          - "502-504"
        service: "maintenance@file"
        query: "/"

    # Public middleware chain applied globally
    sec-public:
      chain:
        middlewares:
          - sec-transport
          - rate-limit
          - error-pages

# -------------------------------------------------------------------------------------------------
# 3. TLS OPTIONS
# -------------------------------------------------------------------------------------------------
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305